<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Refeely Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2350CC93'/%3E%3Ctext x='50%25' y='54%25' font-family='Arial,sans-serif' font-size='38' font-weight='800' fill='white' text-anchor='middle' dominant-baseline='middle'%3ER%3C/text%3E%3Crect x='34' y='38' width='8' height='8' rx='1' fill='%23C4A882'/%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--primary:#50CC93;--primary-light:#6DD9A6;--primary-bg:#EEFBF4;
--success:#50CC93;--success-bg:#EEFBF4;
--warning:#ea580c;--warning-bg:#fff7ed;
--purple:#AA9587;--purple-bg:#F7F3F1;
--rose:#e11d48;--rose-bg:#fff1f2;
--teal:#3BA876;--teal-bg:#EEFBF4;
--amber:#AA9587;--amber-bg:#F7F3F1;
--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;
--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;
--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;
--radius:16px;
--shadow-sm:0 1px 2px rgba(0,0,0,0.04);
--shadow-md:0 4px 6px -1px rgba(0,0,0,0.06),0 2px 4px -2px rgba(0,0,0,0.04);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* HEADER */
.header{background:white;border-bottom:1px solid var(--gray-200);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-left{display:flex;align-items:center;gap:16px;}
.logo{height:36px;display:flex;align-items:center;}
.header-title{font-size:20px;font-weight:700;color:var(--gray-900);}
.header-subtitle{font-size:13px;color:var(--gray-400);}
.header-right{display:flex;align-items:center;gap:12px;}
.live-badge{display:flex;align-items:center;gap:6px;background:#fef2f2;color:#dc2626;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;}
.live-dot{width:7px;height:7px;background:#dc2626;border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}
.date-display{font-size:14px;color:var(--gray-500);font-weight:500;}

/* EDIT MODE TOGGLE */
.edit-toggle{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:10px;border:1.5px solid var(--gray-200);background:white;cursor:pointer;font-size:13px;font-weight:600;color:var(--gray-600);transition:all .2s;}
.edit-toggle:hover{border-color:#50CC93;color:#3BA876;}
.edit-toggle.active{background:#50CC93;color:white;border-color:#50CC93;}
.edit-toggle svg{width:16px;height:16px;}

/* TABS */
.tab-bar{background:white;border-bottom:1px solid var(--gray-200);padding:0 40px;display:flex;gap:0;overflow-x:auto;align-items:center;}
.tab-btn{padding:14px 24px;font-size:14px;font-weight:600;color:var(--gray-400);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap;}
.tab-btn:hover{color:var(--gray-600);}
.tab-btn.active{color:#3BA876;border-bottom-color:#50CC93;}
.tab-btn .tab-emoji{margin-right:6px;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.add-team-btn{padding:10px 18px;font-size:13px;font-weight:600;color:#3BA876;border:1.5px dashed #50CC93;background:#EEFBF4;border-radius:8px;cursor:pointer;margin:6px 0 6px 8px;white-space:nowrap;transition:all .2s;display:none;}
.add-team-btn:hover{background:#50CC93;color:white;}
body.edit-mode .add-team-btn{display:block;}

.main{max-width:1320px;margin:0 auto;padding:32px 40px 60px;}

/* BANNER */
.banner{background:linear-gradient(135deg,#50CC93 0%,#3BA876 50%,#AA9587 100%);border-radius:var(--radius);padding:36px 40px;color:white;margin-bottom:32px;position:relative;overflow:hidden;}
.banner::before{content:'';position:absolute;top:-50%;right:-20%;width:400px;height:400px;background:rgba(255,255,255,.05);border-radius:50%;}
.banner-content{position:relative;z-index:1;}
.banner-greeting{font-size:14px;opacity:.8;font-weight:500;margin-bottom:8px;}
.banner-headline{font-size:28px;font-weight:800;line-height:1.3;margin-bottom:6px;}
.banner-sub{font-size:15px;opacity:.75;}

/* CARDS */
.team-overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:32px;}
.team-overview-card{background:white;border-radius:var(--radius);padding:24px;border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.team-overview-card:hover{box-shadow:0 12px 28px -4px rgba(0,0,0,.12),0 4px 10px -2px rgba(0,0,0,.06);transform:translateY(-6px);border-color:var(--gray-300);}
.team-overview-card .card-accent{position:absolute;top:0;left:0;right:0;height:4px;}
.team-name{font-size:15px;font-weight:700;color:var(--gray-900);display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.team-emoji{font-size:20px;}
.team-main-goal{font-size:13px;color:var(--gray-500);font-weight:500;margin-bottom:16px;line-height:1.5;}
.team-metric{display:flex;align-items:flex-end;gap:4px;margin-bottom:10px;}
.team-metric-value{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.02em;}
.team-metric-unit{font-size:14px;font-weight:600;color:var(--gray-400);margin-bottom:2px;}
.mini-progress{width:100%;height:8px;background:var(--gray-100);border-radius:6px;overflow:hidden;}
.mini-progress-fill{height:100%;border-radius:6px;transition:width 1s ease;}
.mini-progress-label{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;font-weight:600;}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
.stat-card{background:white;border-radius:var(--radius);padding:24px;border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);transition:all .2s;}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.stat-label{font-size:13px;color:var(--gray-500);font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.stat-value{font-size:32px;font-weight:800;color:var(--gray-900);letter-spacing:-.02em;line-height:1;}
.stat-unit{font-size:16px;font-weight:600;color:var(--gray-400);margin-left:2px;}
.stat-change{font-size:12px;font-weight:600;margin-top:8px;}
.stat-change.positive{color:var(--success);}
.stat-change.caution{color:var(--warning);}

.card{background:white;border-radius:var(--radius);padding:28px;border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);margin-bottom:24px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.card-title{font-size:16px;font-weight:700;color:var(--gray-900);}
.card-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;background:var(--primary-bg);color:var(--primary);}

/* TEAM PAGE */
.team-page-header{display:flex;align-items:center;gap:16px;margin-bottom:32px;}
.team-page-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;}
.team-page-title{font-size:24px;font-weight:800;color:var(--gray-900);}
.team-page-desc{font-size:14px;color:var(--gray-500);}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;margin-bottom:28px;}
.kpi-card{background:white;border-radius:var(--radius);padding:24px;border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);position:relative;}
.kpi-title{font-size:13px;color:var(--gray-500);font-weight:500;margin-bottom:10px;}
.kpi-row{display:flex;align-items:flex-end;justify-content:space-between;}
.kpi-value{font-size:28px;font-weight:800;line-height:1;letter-spacing:-.02em;}
.kpi-target{font-size:12px;color:var(--gray-400);font-weight:500;}
.kpi-progress{margin-top:14px;}

.progress-track{width:100%;height:18px;background:var(--gray-100);border-radius:10px;overflow:hidden;position:relative;}
.progress-fill{height:100%;border-radius:10px;transition:width 1.5s cubic-bezier(.4,0,.2,1);}
.progress-pct{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:800;color:var(--gray-500);z-index:1;line-height:1;}
.progress-fill.green{background:linear-gradient(90deg,#50CC93,#6DD9A6);}
.progress-fill.brown{background:linear-gradient(90deg,#AA9587,#C4B5A9);}
.progress-fill.teal{background:linear-gradient(90deg,#3BA876,#50CC93);}
.progress-fill.sage{background:linear-gradient(90deg,#7BAE8E,#9CC5AA);}
.progress-fill.rose{background:linear-gradient(90deg,#C4867A,#D9A89F);}
.progress-fill.slate{background:linear-gradient(90deg,#8B9DAF,#A8B8C8);}

.goal-list{display:flex;flex-direction:column;gap:16px;}
.goal-item{background:white;border-radius:var(--radius);padding:24px;border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);position:relative;}
.goal-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.goal-item-title{font-size:15px;font-weight:700;color:var(--gray-800);}
.goal-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
.goal-status.on-track{background:var(--success-bg);color:var(--success);}
.goal-status.at-risk{background:var(--warning-bg);color:var(--warning);}
.goal-status.behind{background:var(--rose-bg);color:var(--rose);}
.goal-item-meta{display:flex;gap:24px;font-size:13px;color:var(--gray-500);margin-bottom:14px;flex-wrap:wrap;}
.goal-item-meta strong{color:var(--gray-700);}

/* EDIT BUTTONS (hidden by default, shown in edit mode) */
.edit-btn{display:none;position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:8px;border:1.5px solid var(--gray-200);background:white;cursor:pointer;align-items:center;justify-content:center;font-size:14px;transition:all .2s;z-index:5;}
.edit-btn:hover{border-color:#50CC93;background:#EEFBF4;}
.delete-btn{display:none;position:absolute;top:12px;right:50px;width:32px;height:32px;border-radius:8px;border:1.5px solid #fecaca;background:#fff5f5;cursor:pointer;align-items:center;justify-content:center;font-size:14px;color:var(--rose);transition:all .2s;z-index:5;}
.delete-btn:hover{background:#fecaca;}
body.edit-mode .edit-btn,body.edit-mode .delete-btn{display:flex;}
.add-btn{display:none;padding:14px;border-radius:var(--radius);border:2px dashed var(--gray-300);background:var(--gray-50);cursor:pointer;font-size:14px;font-weight:600;color:var(--gray-400);text-align:center;transition:all .2s;margin-top:16px;}
.add-btn:hover{border-color:#50CC93;color:#3BA876;background:#EEFBF4;}
body.edit-mode .add-btn{display:block;}

/* D-DAY */
.grid-3col{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
.dday-card{background:white;border-radius:var(--radius);padding:24px;text-align:center;border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);}
.dday-label{font-size:13px;color:var(--gray-500);font-weight:500;margin-bottom:8px;}
.dday-number{font-size:48px;font-weight:900;letter-spacing:-.03em;line-height:1;margin-bottom:4px;}
.dday-number.blue{color:#50CC93;}
.dday-number.purple{color:#AA9587;}
.dday-number.rose{color:var(--rose);}
.dday-sub{font-size:12px;color:var(--gray-400);font-weight:500;}

/* MILESTONE */
.milestone-track{position:relative;padding:8px 0;}
.milestone-line{position:absolute;top:18px;left:16px;right:16px;height:3px;background:var(--gray-200);border-radius:2px;}
.milestone-line-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#50CC93,#AA9587);border-radius:2px;transition:width 2s ease;}
.milestone-points{position:relative;display:flex;justify-content:space-between;z-index:1;}
.milestone-point{display:flex;flex-direction:column;align-items:center;gap:10px;}
.milestone-dot{width:18px;height:18px;border-radius:50%;background:white;border:3px solid var(--gray-300);}
.milestone-dot.reached{background:#50CC93;border-color:#50CC93;box-shadow:0 0 0 4px rgba(80,204,147,.2);}
.milestone-dot.current{background:white;border-color:#50CC93;box-shadow:0 0 0 4px rgba(80,204,147,.2);animation:cp 2s infinite;}
@keyframes cp{0%,100%{box-shadow:0 0 0 4px rgba(80,204,147,.2);}50%{box-shadow:0 0 0 8px rgba(80,204,147,.1);}}
.milestone-label{font-size:11px;color:var(--gray-400);font-weight:500;text-align:center;}
.milestone-label.active{color:var(--primary);font-weight:700;}
.milestone-amount{font-size:12px;font-weight:700;color:var(--gray-700);}
.milestone-amount.active{color:var(--primary);}

/* QUOTE */
.news-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:16px;}
.news-card{background:white;border:1px solid var(--gray-200);border-radius:14px;padding:20px;cursor:pointer;transition:all .3s ease;display:flex;flex-direction:column;}
.news-card:hover{box-shadow:0 8px 24px -4px rgba(0,0,0,.1);transform:translateY(-3px);border-color:var(--gray-300);}
.news-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.news-tag{font-size:11px;font-weight:600;color:var(--gray-500);border:1px solid var(--gray-200);padding:2px 8px;border-radius:6px;}
.news-link-icon{font-size:12px;color:var(--gray-300);}
.news-title{font-size:14px;font-weight:700;color:var(--gray-800);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.news-desc{font-size:12px;color:var(--gray-400);line-height:1.6;flex:1;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px;}
.news-thumb{width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:10px;}
.news-source{display:flex;align-items:center;gap:6px;margin-top:auto;}
.news-source-name{font-size:11px;font-weight:600;color:var(--gray-500);}
.news-date{font-size:11px;color:var(--gray-400);margin-left:auto;}
@media(max-width:1024px){.news-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.news-grid{grid-template-columns:1fr;}}

/* MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:20px;padding:32px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);}
.modal.wide{max-width:720px;}
.modal-title{font-size:20px;font-weight:800;color:var(--gray-900);margin-bottom:24px;}
.form-group{margin-bottom:18px;}
.form-label{font-size:13px;font-weight:600;color:var(--gray-600);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:12px 16px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;font-family:inherit;transition:border-color .2s;outline:none;}
.form-input:focus{border-color:#50CC93;}
.form-select{width:100%;padding:12px 16px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;font-family:inherit;background:white;outline:none;cursor:pointer;}
.form-select:focus{border-color:#50CC93;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;}
.btn{padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;border:none;}
.btn-primary{background:#50CC93;color:white;}
.btn-primary:hover{background:#3BA876;}
.btn-cancel{background:var(--gray-100);color:var(--gray-600);}
.btn-cancel:hover{background:var(--gray-200);}
.btn-danger{background:var(--rose);color:white;}
.btn-danger:hover{background:#be123c;}

.footer{text-align:center;padding:20px;font-size:12px;color:var(--gray-400);}

/* SYNC UI */
.sync-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;background:var(--gray-100);color:var(--gray-500);}
.sync-status.connected{background:#EEFBF4;color:#3BA876;}
.sync-status.syncing{background:#FEF9C3;color:#CA8A04;}
.sync-status.error{background:#fef2f2;color:#dc2626;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.sync-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1.5px solid var(--gray-200);background:white;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray-600);transition:all .2s;}
.sync-btn:hover{border-color:#50CC93;color:#3BA876;}
.sync-btn svg{width:14px;height:14px;}
.sync-btn.spinning svg{animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sync-settings-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1.5px solid var(--gray-200);background:white;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray-600);transition:all .2s;}
.sync-settings-btn:hover{border-color:#50CC93;color:#3BA876;}
.sync-toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;color:white;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
.sync-toast.show{opacity:1;transform:translateY(0);}
.sync-toast.success{background:#3BA876;}
.sync-toast.error{background:#dc2626;}
.sync-toast.info{background:#50CC93;}

/* WEEKLY CHART */
.kpi-expanded-layout{display:flex;gap:20px;margin-bottom:20px;animation:fadeIn .3s ease;}
.kpi-expanded-left{flex:0 0 260px;min-width:220px;}
.kpi-expanded-right{flex:1;min-width:0;background:white;border-radius:var(--radius);padding:28px;border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);}
.kpi-others-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:20px;}
.kpi-others-row .kpi-card{opacity:.85;transition:opacity .2s;}
.kpi-others-row .kpi-card:hover{opacity:1;}
.line-chart-container{position:relative;width:100%;height:220px;margin:16px 0;}
.line-chart-svg{width:100%;height:100%;}
.line-chart-dot{fill:white;stroke-width:3;cursor:pointer;transition:r .15s;}
.line-chart-dot:hover{r:7;}
.line-chart-tooltip{position:absolute;background:var(--gray-800);color:white;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;z-index:10;transform:translate(-50%,-100%);margin-top:-10px;}
.weekly-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.weekly-stat-card{flex:1;min-width:100px;background:var(--gray-50);border-radius:10px;padding:12px 16px;text-align:center;}
.weekly-stat-card .stat-label{font-size:11px;color:var(--gray-400);font-weight:600;margin-bottom:4px;}
.weekly-stat-card .stat-value{font-size:18px;font-weight:800;}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.chart-title{font-size:13px;font-weight:700;color:var(--gray-700);}
.chart-add-btn{font-size:12px;font-weight:600;color:#3BA876;background:#EEFBF4;border:1px solid #50CC93;border-radius:6px;padding:4px 10px;cursor:pointer;}
.chart-add-btn:hover{background:#50CC93;color:white;}
.weekly-data-table{width:100%;border-collapse:separate;border-spacing:0;margin-top:16px;font-size:13px;}
.weekly-data-table th{text-align:left;padding:8px 12px;font-weight:700;color:var(--gray-500);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--gray-200);}
.weekly-data-table td{padding:8px 12px;border-bottom:1px solid var(--gray-100);}
.weekly-data-table tr:last-child td{border-bottom:none;}
.weekly-data-table .change-cell{font-weight:700;font-size:12px;}
.weekly-change{display:inline-flex;align-items:center;gap:2px;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;}
.weekly-change.up{color:#3BA876;background:#EEFBF4;}
.weekly-change.down{color:#dc2626;background:#fef2f2;}
.weekly-change.same{color:var(--gray-400);background:var(--gray-100);}
.weekly-input-row{display:flex;gap:8px;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-200);}
.weekly-input-row input{flex:1;}
.weekly-input-row .btn{padding:6px 14px;font-size:12px;}

/* INLINE INPUT + UNIT */
.input-unit-row{display:flex;gap:6px;align-items:center;}
.input-unit-row .form-input{flex:1;min-width:0;}
.input-unit-row .form-select{width:90px;flex-shrink:0;}
.auto-pct{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;background:var(--gray-50);font-size:13px;color:var(--gray-600);}
.auto-pct strong{color:#3BA876;font-size:18px;}

/* RESPONSIVE */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){
.main{padding:20px;}.stats-row{grid-template-columns:repeat(2,1fr);}.grid-3col{grid-template-columns:1fr;}.header{padding:16px 20px;}.tab-bar{padding:0 16px;}
.kpi-expanded-layout{flex-direction:column;}.kpi-expanded-left{flex:none;width:100%;}
}
@media(max-width:600px){
.stats-row{grid-template-columns:1fr;}.weekly-stats{flex-direction:column;}
}

/* ===== DARK MODE ===== */
.dark-toggle{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;border:1.5px solid var(--gray-200);background:white;cursor:pointer;font-size:16px;transition:all .2s;line-height:1;}
.dark-toggle:hover{border-color:#50CC93;}
body.dark-mode{--gray-50:#0f1117;--gray-100:#1a1d27;--gray-200:#2a2d3a;--gray-300:#3a3d4a;--gray-400:#7a7d8a;--gray-500:#9a9daa;--gray-600:#babdca;--gray-700:#dadde8;--gray-800:#eaedfa;--gray-900:#f5f5ff;color:var(--gray-800);background:var(--gray-50);}
body.dark-mode .header{background:#14161e;border-color:var(--gray-200);}
body.dark-mode .card,body.dark-mode .stat-card,body.dark-mode .team-overview-card,body.dark-mode .kpi-card,body.dark-mode .goal-card,body.dark-mode .dday-card,body.dark-mode .news-card,body.dark-mode .banner{background:#1a1d27;border-color:var(--gray-200);color:var(--gray-800);}
body.dark-mode .kpi-expanded-right,body.dark-mode .weekly-stat-card{background:#1a1d27;border-color:var(--gray-200);}
body.dark-mode .tab-btn{color:var(--gray-500);background:transparent;}
body.dark-mode .tab-btn.active{background:#1a1d27;color:var(--gray-800);}
body.dark-mode .modal-content{background:#1a1d27;color:var(--gray-800);}
body.dark-mode .form-input,body.dark-mode .form-select{background:var(--gray-100);color:var(--gray-800);border-color:var(--gray-200);}
body.dark-mode .progress-track{background:var(--gray-200);}
body.dark-mode .dark-toggle{background:#1a1d27;border-color:var(--gray-300);color:var(--gray-700);}
body.dark-mode .sync-btn,body.dark-mode .sync-settings-btn{background:#1a1d27;border-color:var(--gray-300);color:var(--gray-600);}
body.dark-mode .sync-status{background:var(--gray-100);color:var(--gray-500);}
body.dark-mode .edit-toggle{background:#1a1d27;border-color:var(--gray-300);}
body.dark-mode .edit-toggle svg{stroke:var(--gray-600);}
body.dark-mode .team-overview-card:hover{box-shadow:0 12px 28px -4px rgba(0,0,0,.4);}
body.dark-mode .banner{background:linear-gradient(135deg,#1a2e23,#1a1d27) !important;}
body.dark-mode .banner-greeting,body.dark-mode .banner-headline{color:var(--gray-800) !important;}
body.dark-mode .banner-sub{color:var(--gray-500) !important;}

/* ===== STATUS COLORS (달성률 기반) ===== */
.status-danger{color:#ef4444 !important;}
.status-warning{color:#f59e0b !important;}
.status-good{color:#22c55e !important;}
.status-great{color:#10b981 !important;}
.progress-fill.status-red{background:linear-gradient(90deg,#ef4444,#f87171);}
.progress-fill.status-yellow{background:linear-gradient(90deg,#f59e0b,#fbbf24);}
.progress-fill.status-green{background:linear-gradient(90deg,#22c55e,#4ade80);}
.progress-fill.status-great{background:linear-gradient(90deg,#10b981,#34d399);}

/* ===== QUARTER TREND CHART ===== */
.quarter-chart-container{position:relative;width:100%;height:180px;margin-top:16px;}
.quarter-chart-svg{width:100%;height:100%;}

/* ===== PRINT MODE ===== */
@media print{
    body{background:white !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .header{position:static !important;border:none !important;padding:12px 20px !important;}
    .header-right{display:none !important;}
    .tab-bar{display:none !important;}
    .main{padding:16px !important;max-width:100% !important;}
    .edit-btn,.delete-btn,.edit-toggle,.modal-overlay,.add-btn,.banner{display:none !important;}
    .card,.stat-card,.team-overview-card,.kpi-card,.goal-item,.dday-card,.quote-card{break-inside:avoid;box-shadow:none !important;border:1px solid #ddd !important;}
    .progress-fill{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .team-overview-grid{grid-template-columns:repeat(2,1fr) !important;}
    .stats-row{grid-template-columns:repeat(2,1fr) !important;}
    .mini-progress-fill,.progress-fill{transition:none !important;}
    @page{margin:10mm;size:A4;}
    .print-header{display:block !important;text-align:center;padding:16px 0;border-bottom:2px solid #50CC93;margin-bottom:20px;}
    .print-header h1{font-size:20px;font-weight:800;color:#111;margin-bottom:4px;}
    .print-header p{font-size:12px;color:#666;}
}
.print-header{display:none;}
</style>

// ===== 세부 목표 자동 상태 계산 (분기 경과율 대비 달성률) =====
function calcGoalAutoStatus(goal){
    const pct=goal.percent||0;
    if(pct>=100) return {v:'on-track',l:'달성'};
    // 분기 경과율 계산
    const now=new Date();
    const month=now.getMonth(); // 0-11
    const day=now.getDate();
    const q=goal.quarter;
    let elapsed=0.5; // 기본값: 절반
    if(q==='Q1'||q==='Q2'||q==='Q3'||q==='Q4'){
        const qStarts={Q1:0,Q2:3,Q3:6,Q4:9};
        const qStart=qStarts[q];
        const qEnd=qStart+3;
        // 현재 월이 해당 분기 범위 안인지 확인
        if(month>=qStart && month<qEnd){
            // 분기 내 경과 일수 / 총 일수
            const startDate=new Date(now.getFullYear(),qStart,1);
            const endDate=new Date(now.getFullYear(),qEnd,0); // 분기 마지막 날
            const totalDays=(endDate-startDate)/(864e5)+1;
            const passedDays=(now-startDate)/(864e5)+1;
            elapsed=Math.min(passedDays/totalDays,1);
        } else if(month>=qEnd){
            elapsed=1; // 분기 이미 지남
        } else {
            elapsed=0; // 분기 아직 안 시작
        }
    } else {
        // 'all' 또는 미지정: 연간 경과율
        const startOfYear=new Date(now.getFullYear(),0,1);
        const endOfYear=new Date(now.getFullYear(),11,31);
        elapsed=Math.min((now-startOfYear)/(endOfYear-startOfYear),1);
    }
    // 기대 달성률 대비 실제 달성률 비율
    const expectedPct=elapsed*100;
    if(expectedPct<=0) return {v:'on-track',l:'순조'}; // 분기 시작 전
    const ratio=pct/expectedPct;
    if(ratio>=0.7) return {v:'on-track',l:'순조'};
    if(ratio>=0.4) return {v:'at-risk',l:'주의'};
    return {v:'behind',l:'위험'};
}

// ===== QUARTER TREND SVG CHART =====
function renderQuarterTrendChart(quarters){
    const w=500,h=160,px=50,py=20;
    const plotW=w-px*2,plotH=h-py*2;
    const vals=quarters.map(q=>q.current||0);
    const targets=quarters.map(q=>q.target||0);
    const maxVal=Math.max(...vals,...targets,1)*1.2;
    const labels=['Q1','Q2','Q3','Q4'];
    const curQi=Math.floor(new Date().getMonth()/3);

    function x(i){return px+i*(plotW/3);}
    function y(v){return py+plotH-(v/maxVal)*plotH;}

    // Grid lines
    let gridLines='';
    for(let i=0;i<=4;i++){
        const gv=maxVal*(i/4);
        const gy=y(gv);
        gridLines+=`<line x1="${px}" y1="${gy}" x2="${w-px}" y2="${gy}" stroke="var(--gray-200)" stroke-width="0.5"/>`;
        if(i<4) gridLines+=`<text x="${px-8}" y="${gy+4}" text-anchor="end" font-size="10" fill="var(--gray-400)">${Math.round(gv*10)/10}</text>`;
    }

    // Target line (dashed)
    let targetPath='';
    if(targets.some(t=>t>0)){
        targetPath=`<path d="M${targets.map((t,i)=>`${x(i)},${y(t)}`).join(' L')}" fill="none" stroke="var(--gray-300)" stroke-width="1.5" stroke-dasharray="6,4"/>`;
    }

    // Gradient fill under current line
    const gradId='qTrendGrad';
    const areaPath=`M${x(0)},${y(vals[0])} ${vals.map((v,i)=>`L${x(i)},${y(v)}`).join(' ')} L${x(3)},${y(0)} L${x(0)},${y(0)} Z`;
    const linePath=`M${vals.map((v,i)=>`${x(i)},${y(v)}`).join(' L')}`;

    // Dots
    let dots='';
    vals.forEach((v,i)=>{
        const isCur=i===curQi;
        dots+=`<circle cx="${x(i)}" cy="${y(v)}" r="${isCur?6:4}" fill="#50CC93" stroke="white" stroke-width="2"/>`;
        dots+=`<text x="${x(i)}" y="${y(v)-12}" text-anchor="middle" font-size="11" font-weight="700" fill="${isCur?'#3BA876':'var(--gray-600)'}">${v>0?v+'억':'-'}</text>`;
        dots+=`<text x="${x(i)}" y="${h-2}" text-anchor="middle" font-size="11" font-weight="${isCur?'800':'500'}" fill="${isCur?'var(--gray-900)':'var(--gray-400)'}">${labels[i]}</text>`;
    });

    return `<div class="quarter-chart-container">
        <svg class="quarter-chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
            <defs><linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#50CC93" stop-opacity="0.3"/><stop offset="100%" stop-color="#50CC93" stop-opacity="0.02"/></linearGradient></defs>
            ${gridLines}
            ${targetPath}
            <path d="${areaPath}" fill="url(#${gradId})"/>
            <path d="${linePath}" fill="none" stroke="#50CC93" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            ${dots}
        </svg>
    </div>`;
}

// ===== 주간 데이터 날짜순 정렬 =====
function parseWeekLabel(lbl){
    // "4/7 ~ 4/13" → 407, "4월 둘째주 (4/7 ~ 4/13)" → 407, "4/2주" → 402
    const mRange=lbl.match(/(\d+)\/(\d+)\s*~/);
    if(mRange) return parseInt(mRange[1])*100+parseInt(mRange[2]);
    const mMD=lbl.match(/(\d+)월\s*(\d+)일/);
    if(mMD) return parseInt(mMD[1])*100+parseInt(mMD[2]);
    const mSlash=lbl.match(/(\d+)\/(\d+)/);
    if(mSlash) return parseInt(mSlash[1])*100+parseInt(mSlash[2]);
    return 0;
}
function sortWeeklyData(wd){
    if(!wd||wd.length<=1) return wd;
    return wd.slice().sort((a,b)=>parseWeekLabel(a.label)-parseWeekLabel(b.label));
}

// ===== WEEKLY TREND CHART (전사 주차별 추이) =====
function aggregateWeeklyData(){
    // 모든 팀의 isRevenue KPI 주간 데이터를 주차별로 합산
    const weekMap=new Map(); // label -> {sum, weekStart}
    if(!DATA.teams) return [];
    DATA.teams.forEach(team=>{
        if(!team.kpis) return;
        team.kpis.forEach(kpi=>{
            if(!kpi.isRevenue||!kpi.weeklyData) return;
            kpi.weeklyData.forEach(w=>{
                const existing=weekMap.get(w.label)||{sum:0,label:w.label};
                existing.sum+=w.value;
                weekMap.set(w.label,existing);
            });
        });
    });
    // label 기준 정렬 (날짜 파싱)
    const entries=Array.from(weekMap.values());
    entries.sort((a,b)=>{
        const parseDate=lbl=>{
            const m=lbl.match(/(\d+)월\s*(\d+)일/);
            if(!m) return 0;
            return parseInt(m[1])*100+parseInt(m[2]);
        };
        return parseDate(a.label)-parseDate(b.label);
    });
    return entries;
}

function aggregateTeamWeeklyData(team){
    // 한 팀의 대표 KPI 주간 데이터를 주차별로 합산
    const weekMap=new Map();
    if(!team.kpis) return [];
    team.kpis.forEach(kpi=>{
        if(!kpi.isPrimary||!kpi.weeklyData) return;
        kpi.weeklyData.forEach(w=>{
            const existing=weekMap.get(w.label)||{sum:0,label:w.label};
            existing.sum+=w.value;
            weekMap.set(w.label,existing);
        });
    });
    const entries=Array.from(weekMap.values());
    entries.sort((a,b)=>{
        const parseDate=lbl=>{
            const m=lbl.match(/(\d+)월\s*(\d+)일/);
            if(!m) return 0;
            return parseInt(m[1])*100+parseInt(m[2]);
        };
        return parseDate(a.label)-parseDate(b.label);
    });
    return entries;
}

            <path d="${cumLinePath}" fill="none" stroke="${cumColor}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

function recalcCompanyFromTeams(){
    if(!DATA.teams||!DATA.company||!DATA.company.quarters) return;
    const qMap={'Q1':0,'Q2':1,'Q3':2,'Q4':3};
    const curQi=Math.floor(new Date().getMonth()/3);
    // isRevenue KPI들만 분기별로 합산
    const qSums=[0,0,0,0];
    DATA.teams.forEach(team=>{
        if(!team.kpis) return;
        team.kpis.forEach(k=>{
            if(!k.isRevenue) return;
            const val=extractNumber(k.current);
            if(k.quarter && k.quarter!=='all' && qMap[k.quarter]!==undefined){
                qSums[qMap[k.quarter]]+=val;
            } else {
                // 연간('all') KPI → 현재 분기에 반영
                qSums[curQi]+=val;
            }
        });
    });
    // 회사 분기 데이터 업데이트
    for(let i=0;i<4;i++){
        if(DATA.company.quarters[i]){
            DATA.company.quarters[i].current=Math.round(qSums[i]*100)/100;
        }
    }
    // 연간 합산
    DATA.company.annualCurrent=Math.round(qSums.reduce((a,b)=>a+b,0)*100)/100;
    // 현재 분기 편의 필드
    DATA.company.q2Current=qSums[curQi];
}

function saveData(){
    recalcCompanyFromTeams();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
    if(syncUrl) pushToCloud();
}

function showToast(msg, type='success'){

// JSONP: <script> 태그로 Google Apps Script 호출 (CORS 제한 없음)
function jsonpCall(url, params){
    return new Promise((resolve, reject)=>{
        const cbName = '_refeelyCallback_' + (++_jsonpCounter) + '_' + Date.now();
        const timeout = setTimeout(()=>{
            delete window[cbName];
            if(script.parentNode) script.parentNode.removeChild(script);
            reject(new Error('요청 시간 초과 (15초)'));
        }, 15000);

        window[cbName] = function(data){
            clearTimeout(timeout);
            delete window[cbName];
            if(script.parentNode) script.parentNode.removeChild(script);
            resolve(data);
        };

        const qs = new URLSearchParams(params);
        qs.set('callback', cbName);
        const script = document.createElement('script');
        script.src = url + '?' + qs.toString();
        script.onerror = function(){
            clearTimeout(timeout);
            delete window[cbName];
            if(script.parentNode) script.parentNode.removeChild(script);
            reject(new Error('스크립트 로드 실패 — URL을 확인하세요'));
        };
        document.body.appendChild(script);
    });
}

// 클라우드에서 받은 데이터가 유효한 대시보드 형식인지 검증
function isValidDashboardData(d){
    return d && typeof d==='object' && d.company && Array.isArray(d.teams);
}

async function connectSync(){
    const url=document.getElementById('m_syncUrl').value.trim();
    if(!url){showToast('URL을 입력하세요','error');return;}
    if(!url.startsWith('https://script.google.com/')){
        showToast('Google Apps Script URL이 아닙니다','error');return;
    }
    const btn=document.getElementById('syncConnectBtn');
    const resultDiv=document.getElementById('syncTestResult');
    btn.textContent='연결 중...';btn.disabled=true;
    resultDiv.style.background='#FEF9C3';resultDiv.style.color='#CA8A04';
    resultDiv.textContent='🔄 연결 테스트 중...';
    updateSyncUI('syncing','연결 중...');
    try{
        const json = await jsonpCall(url, {action:'read'});
        if(!json.success) throw new Error(json.error||'API 오류');
        syncUrl=url;
        localStorage.setItem(SYNC_URL_KEY,url);
        // 클라우드 데이터가 유효한 대시보드 형식이면 불러오기, 아니면 현재 데이터 업로드
        if(json.data && isValidDashboardData(json.data)){
            DATA=json.data;
            localStorage.setItem(STORAGE_KEY,JSON.stringify(DATA));
            renderTabs();renderContent();
            showToast('클라우드 데이터를 불러왔습니다!','success');
        } else {
            await pushToCloud();
            showToast('현재 데이터를 클라우드에 업로드했습니다!','success');
        }
        updateSyncUI('connected','클라우드 연결됨');
        closeModal();
    }catch(e){
        updateSyncUI('error','연결 실패');
        resultDiv.style.background='#fef2f2';resultDiv.style.color='#dc2626';
        resultDiv.innerHTML='❌ 연결 실패: '+e.message+'<br><br><strong>확인사항:</strong><br>• Apps Script를 <strong>새 버전</strong>으로 재배포했는지<br>• 액세스 권한이 <strong>모든 사용자(Anyone)</strong>인지<br>• URL이 <code>/exec</code>으로 끝나는지';
        btn.textContent='다시 시도';btn.disabled=false;
    }
}

function disconnectSync(){
    syncUrl='';
    localStorage.removeItem(SYNC_URL_KEY);
    updateSyncUI('','로컬 모드');
    showToast('클라우드 연결이 해제되었습니다','info');
    closeModal();

// 숨겨진 form + iframe POST로 저장 (CORS 우회 + 데이터 크기 제한 없음)
function pushToCloud(){
    if(!syncUrl||isSyncing)return;
    isSyncing=true;
    const btn=document.getElementById('syncRefreshBtn');
    btn.classList.add('spinning');
    updateSyncUI('syncing','저장 중...');
    try{
        const payload = JSON.stringify({data:DATA,editor:'dashboard',action:'save'});
        // 동적 form 생성 → 숨겨진 iframe으로 POST
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = syncUrl;
        form.target = 'syncFrame'; // 숨겨진 iframe으로 전송
        form.style.display = 'none';
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'payload';
        input.value = payload;
        form.appendChild(input);
        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);
        // iframe 로드 완료 시 성공 처리
        const frame = document.getElementById('syncFrame');
        const onDone = ()=>{
            frame.removeEventListener('load', onDone);
            isSyncing=false;
            btn.classList.remove('spinning');
            updateSyncUI('connected','클라우드 저장됨');
        };
        frame.addEventListener('load', onDone);
        // 타임아웃 안전장치 (10초)
        setTimeout(()=>{
            isSyncing=false;
            btn.classList.remove('spinning');
            updateSyncUI('connected','클라우드 연결됨');
        }, 10000);
    }catch(e){
        isSyncing=false;
        btn.classList.remove('spinning');
        updateSyncUI('error','저장 실패');
        console.error('Sync push error:',e);
    }
}

async function pullFromCloud(){
    if(!syncUrl||isSyncing)return;
    isSyncing=true;
    const btn=document.getElementById('syncRefreshBtn');
    btn.classList.add('spinning');
    updateSyncUI('syncing','동기화 중...');
    try{
        const json = await jsonpCall(syncUrl, {action:'read'});
        if(json.success && json.data && isValidDashboardData(json.data)){
            DATA=json.data;
            localStorage.setItem(STORAGE_KEY,JSON.stringify(DATA));
            renderTabs();renderContent();
            updateSyncUI('connected','클라우드 연결됨');
            showToast('최신 데이터를 불러왔습니다','success');
        } else {
            updateSyncUI('connected','클라우드 연결됨');
        }
    }catch(e){
        updateSyncUI('error','동기화 실패');
        showToast('동기화 실패: '+e.message,'error');
    }finally{
        isSyncing=false;
        btn.classList.remove('spinning');
    }
}

let cachedNews=null;
let newsLastFetch=0;
const NEWS_CACHE_MS=10*60*1000; // 10분 캐시

function fetchRefeelyNews(){
    const now=Date.now();
    if(cachedNews && (now-newsLastFetch)<NEWS_CACHE_MS){
        renderNewsSection(cachedNews);
        return;
    }
    const googleRss='https://news.google.com/rss/search?q=리필리+refeely&hl=ko&gl=KR&ceid=KR:ko';
    const proxies=[
        url=>'https://api.allorigins.win/raw?url='+encodeURIComponent(url),
        url=>'https://corsproxy.io/?'+encodeURIComponent(url),
        url=>'https://api.rss2json.com/v1/api.json?rss_url='+encodeURIComponent(url)+'&count=20'
    ];
    tryFetchNews(proxies,0,googleRss);
}

function tryFetchNews(proxies,idx,rssUrl){
    if(idx>=proxies.length){renderNewsSection(null);return;}
    const url=proxies[idx](rssUrl);
    const isRss2Json=url.includes('rss2json');
    fetch(url,{signal:AbortSignal.timeout(8000)})
        .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return isRss2Json?r.json():r.text();})
        .then(data=>{
            let items;
            if(isRss2Json){
                if(data.status==='ok'&&data.items&&data.items.length>0) items=data.items.map(i=>({title:i.title,link:i.link,pubDate:i.pubDate,desc:i.description||'',author:i.author||''}));
            } else {
                items=parseRssXml(data);
            }
            if(items&&items.length>0){
                items.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
                cachedNews=items.slice(0,4);
                newsLastFetch=Date.now();
                renderNewsSection(cachedNews);
            } else {
                tryFetchNews(proxies,idx+1,rssUrl);
            }
        })
        .catch(()=>tryFetchNews(proxies,idx+1,rssUrl));
}

function parseRssXml(xml){
    try{
        const parser=new DOMParser();
        const doc=parser.parseFromString(xml,'text/xml');
        const items=doc.querySelectorAll('item');
        const results=[];
        items.forEach(item=>{
            const title=(item.querySelector('title')||{}).textContent||'';
            const link=(item.querySelector('link')||{}).textContent||'';
            const pubDate=(item.querySelector('pubDate')||{}).textContent||'';
            const desc=(item.querySelector('description')||{}).textContent||'';
            const source=(item.querySelector('source')||{}).textContent||'';
            if(title) results.push({title,link,pubDate,desc,author:source});
        });
        return results;
    }catch(e){return [];}
}

function renderNewsSection(items){
    const el=document.getElementById('newsSection');
    if(!el) return;
    if(!items||items.length===0){
        el.innerHTML='<div style="text-align:center;padding:40px;color:var(--gray-400);font-size:14px">뉴스를 불러올 수 없습니다. 잠시 후 다시 시도해주세요.</div>';
        return;
    }
    let cards='';
    items.forEach(item=>{
        const title=item.title||'';
        const rawDesc=(item.desc||item.description||'');
        const desc=rawDesc.replace(/<[^>]*>/g,'').substring(0,120);
        const link=item.link||'#';
        const pubDate=item.pubDate?new Date(item.pubDate):null;
        const dateStr=pubDate?pubDate.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
        const imgMatch=rawDesc.match(/<img[^>]+src="([^"]+)"/);
        const thumb=item.thumbnail||item.enclosure?.link||(imgMatch?imgMatch[1]:'')||'';
        const source=item.author||extractSourceFromTitle(title);
        cards+=`<a href="${link}" target="_blank" rel="noopener" class="news-card" style="text-decoration:none;color:inherit;">
            <div class="news-card-top"><span class="news-tag">뉴스</span><span class="news-link-icon">↗</span></div>
            <div class="news-title">${escapeHtml(title)}</div>
            ${thumb?'<img class="news-thumb" src="'+thumb+'" onerror="this.style.display=\'none\'" alt="">':''}
            <div class="news-desc">${escapeHtml(desc)}</div>
            <div class="news-source">
                <span class="news-source-name">${escapeHtml(source)}</span>
                <span class="news-date">${dateStr}</span>
            </div>
        </a>`;
    });
    el.innerHTML=`<div class="news-grid">${cards}</div>`;
}

function extractSourceFromTitle(title){
    const m=title.match(/\s-\s([^-]+)$/);
    return m?m[1].trim():'뉴스';
}

function escapeHtml(str){
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== ARCHIVE TAB =====
let archiveTeam='all';
let archiveQuarters=[]; // 빈 배열 = 전체 기간
let archiveSort='newest';
let archiveSearch='';

function collectAllDeliverables(){
    const items=[];
    if(!DATA.teams) return items;
    DATA.teams.forEach(team=>{
        const c=COLORS[team.colorIdx%COLORS.length];
        (team.goals||[]).forEach(goal=>{
            (goal.weeklyData||[]).forEach(w=>{
                if(!w.link) return;
                items.push({
                    teamId:team.id, teamName:team.name, teamEmoji:team.emoji, teamColor:c,
                    goalTitle:goal.title, quarter:goal.quarter||'all',
                    weekLabel:w.label, value:w.value, link:w.link,
                    sortKey:parseWeekLabel(w.label)
                });
            });
        });
    });
    return items;
}

function renderArchive(){
    const all=collectAllDeliverables();
    const teams=DATA.teams||[];

    // 팀 드롭다운
    let teamOpts=`<option value="all">전체</option>`;
    teams.forEach(t=>{ teamOpts+=`<option value="${t.id}" ${archiveTeam===t.id?'selected':''}>${t.emoji} ${t.name}</option>`; });

    // 분기 체크박스
    const qAll=archiveQuarters.length===0;
    let qChecks='';
    ['Q1','Q2','Q3','Q4'].forEach(q=>{
        const checked=archiveQuarters.includes(q)?'checked':'';
        qChecks+=`<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--gray-600)"><input type="checkbox" ${checked} onchange="toggleArchiveQ('${q}')" style="accent-color:#50CC93;width:16px;height:16px">${q}</label>`;
    });

    // 필터링
    let filtered=all;
    if(archiveTeam!=='all') filtered=filtered.filter(i=>i.teamId===archiveTeam);
    if(archiveQuarters.length>0) filtered=filtered.filter(i=>archiveQuarters.includes(i.quarter));
    if(archiveSearch){
        const s=archiveSearch.toLowerCase();
        filtered=filtered.filter(i=>i.goalTitle.toLowerCase().includes(s)||i.teamName.toLowerCase().includes(s)||i.weekLabel.toLowerCase().includes(s)||i.link.toLowerCase().includes(s));
    }

    // 정렬
    if(archiveSort==='newest') filtered.sort((a,b)=>b.sortKey-a.sortKey);
    else filtered.sort((a,b)=>a.sortKey-b.sortKey);

    // 주차별 그룹핑
    const grouped=new Map();
    filtered.forEach(item=>{
        if(!grouped.has(item.weekLabel)) grouped.set(item.weekLabel,[]);
        grouped.get(item.weekLabel).push(item);
    });

    let contentHtml='';
    if(filtered.length===0){
        const isFiltered=(archiveTeam!=='all'||archiveQuarters.length>0||archiveSearch);
        contentHtml=`<div style="text-align:center;padding:60px 20px;color:var(--gray-400)">
            <div style="font-size:48px;margin-bottom:16px">${isFiltered?'🔍':'📁'}</div>
            <div style="font-size:16px;font-weight:600;margin-bottom:8px">${isFiltered?'조건에 맞는 결과물이 없습니다':'아직 등록된 결과물이 없습니다'}</div>
            <div style="font-size:13px">${isFiltered?'필터를 변경하거나 검색어를 수정해보세요':'주간 입력 시 결과물 링크를 함께 등록하면 여기에 자동으로 모입니다'}</div>
        </div>`;
    } else {
        grouped.forEach((items,weekLabel)=>{
            let cards='';
            items.forEach(item=>{
                const domain=(()=>{try{return new URL(item.link).hostname.replace('www.','');}catch(e){return '링크';}})();
                cards+=`<a href="${item.link}" target="_blank" rel="noopener" class="news-card" style="text-decoration:none;color:inherit;">
                    <div class="news-card-top">
                        <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:${item.teamColor.bg};color:${item.teamColor.main}">${item.teamEmoji} ${item.teamName}</span>
                        <span class="news-link-icon">↗</span>
                    </div>
                    <div class="news-title">${item.goalTitle}</div>
                    <div class="news-desc" style="font-size:12px;color:var(--gray-400)">
                        <div style="margin-bottom:4px">📊 수치: <strong style="color:var(--gray-700)">${item.value}</strong></div>
                        <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">🔗 ${domain}</div>
                    </div>
                    <div class="news-source">
                        <span style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--gray-50);color:var(--gray-500)">${item.quarter!=='all'?item.quarter:'연간'}</span>
                        <span class="news-date">${item.weekLabel}</span>
                    </div>
                </a>`;
            });
            contentHtml+=`<div style="margin-bottom:28px">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
                    <div style="font-size:15px;font-weight:800;color:var(--gray-700)">📅 ${weekLabel}</div>
                    <span style="font-size:12px;color:var(--gray-400);font-weight:600">${items.length}건</span>
                    <div style="flex:1;height:1px;background:var(--gray-100)"></div>
                </div>
                <div class="news-grid">${cards}</div>
            </div>`;
        });
    }

    return `
    <div style="margin-bottom:20px">
        <div style="font-size:22px;font-weight:900;color:var(--gray-900);margin-bottom:4px">📁 결과물 아카이브</div>
        <div style="font-size:13px;color:var(--gray-400)">세부 목표에 등록된 결과물 링크를 한눈에 모아봅니다</div>
    </div>

    <div class="card" style="padding:16px 20px;margin-bottom:24px">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:8px">
                <label style="font-size:12px;font-weight:700;color:var(--gray-500);white-space:nowrap">팀</label>
                <select class="form-select" style="font-size:13px;padding:8px 12px;border-radius:10px;min-width:140px" onchange="archiveTeam=this.value;renderContent()">${teamOpts}</select>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
                <label style="font-size:12px;font-weight:700;color:var(--gray-500);white-space:nowrap">기간</label>
                <div style="display:flex;gap:10px;padding:6px 12px;border:1.5px solid var(--gray-200);border-radius:10px;background:white">
                    ${qChecks}
                    <span style="font-size:11px;color:var(--gray-300);margin-left:4px">${qAll?'전체 기간':archiveQuarters.join(', ')}</span>
                </div>
            </div>
            <div style="flex:1;min-width:180px">
                <input class="form-input" placeholder="🔍 목표명, 팀명, 링크 검색..." value="${archiveSearch}" oninput="archiveSearch=this.value;renderContent()" style="font-size:13px;padding:8px 14px">
            </div>
            <select class="form-select" style="font-size:12px;padding:8px 10px;border-radius:10px" onchange="archiveSort=this.value;renderContent()">
                <option value="newest" ${archiveSort==='newest'?'selected':''}>최신순</option>
                <option value="oldest" ${archiveSort==='oldest'?'selected':''}>오래된순</option>
            </select>
        </div>
        ${(!qAll||archiveTeam!=='all'||archiveSearch)?`<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center">
            <span style="font-size:11px;color:var(--gray-400)">활성 필터:</span>
            ${archiveTeam!=='all'?`<span style="font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;background:#EEFBF4;color:#3BA876;cursor:pointer" onclick="archiveTeam='all';renderContent()">✕ ${teams.find(t=>t.id===archiveTeam)?.name||''}</span>`:''}
            ${archiveQuarters.map(q=>`<span style="font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;background:#EEF2FF;color:#5B7FD6;cursor:pointer" onclick="toggleArchiveQ('${q}')">\u2715 ${q}</span>`).join('')}
            ${archiveSearch?`<span style="font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;background:#FEF3C7;color:#D97706;cursor:pointer" onclick="archiveSearch='';renderContent()">\u2715 "${archiveSearch}"</span>`:''}
            <span style="font-size:11px;color:var(--gray-400);font-weight:600">${filtered.length}건</span>
        </div>`:`<div style="margin-top:6px;font-size:11px;color:var(--gray-400)">총 ${filtered.length}건의 결과물</div>`}
    </div>
    ${contentHtml}
    `;
}

    const idx=archiveQuarters.indexOf(q);

    else archiveQuarters.push(q);

        const hasWeekly=getKpiWeeklyData(team,k,k._idx).length>0;
        const hint=(!isSelected&&!hasExpanded)?'<div style="font-size:10px;color:var(--gray-400);margin-top:8px;text-align:center">클릭하여 주차별 추이 보기 '+(hasWeekly?'📊':'')+'</div>':'';
        const selectedIcon=isSelected?'<div style="position:absolute;top:12px;left:12px;font-size:10px;font-weight:700;color:'+c.main+';background:'+c.bg+';padding:2px 8px;border-radius:6px;">📊 선택됨</div>':'';
        return `<div class="kpi-card" style="${selectedStyle}${primaryBorder}cursor:pointer;" onclick="toggleKpiChart('${team.id}',${i})">
            ${selectedIcon}
            <button class="edit-btn" onclick="event.stopPropagation();openKpiModal('${team.id}',${i})">✏️</button>
            <button class="delete-btn" onclick="event.stopPropagation();deleteKpi('${team.id}',${i})">🗑</button>
            <div class="kpi-title">${k.title}${primaryTag}${revenueTag}${qTag}</div>
            <div class="kpi-row"><div class="kpi-value" style="color:${c.main}">${k.current}</div><div class="kpi-target">${k.target}</div></div>
            <div class="kpi-progress"><div class="progress-track"><div class="progress-fill" style="width:0%;background:${c.grad}" data-target="${k.percent}"></div><span class="progress-pct">${k.percent}%</span></div></div>
            ${hint}
        </div>`;
    }

    if(filteredKpis.length===0 && sq!=='all'){
        kpiHtml='<div style="padding:20px;text-align:center;color:var(--gray-400);font-size:14px">이 분기에 해당하는 KPI가 없습니다.</div>';
    } else if(hasExpanded){
        // Find selected KPI
        const selKpi=filteredKpis.find(k=>k._idx===expandedIdx);
        const otherKpis=filteredKpis.filter(k=>k._idx!==expandedIdx);
        if(selKpi){
            kpiHtml+=`<div class="kpi-expanded-layout">
                <div class="kpi-expanded-left">${renderKpiCard(selKpi,selKpi._idx,true)}</div>
                <div class="kpi-expanded-right" onclick="event.stopPropagation()">${renderWeeklyChart(team,selKpi,selKpi._idx,c)}</div>
            </div>`;
        }
        if(otherKpis.length>0){
            kpiHtml+=`<div class="kpi-others-row">`;
            otherKpis.forEach(k=>{ kpiHtml+=renderKpiCard(k,k._idx,false); });
            kpiHtml+=`</div>`;
        }
    } else {
        kpiHtml+=`<div class="kpi-grid">`;
        filteredKpis.forEach(k=>{ kpiHtml+=renderKpiCard(k,k._idx,false); });
        kpiHtml+=`</div>`;
    }

    // Goals
    const filteredGoals=team.goals.map((g,i)=>({...g,_idx:i})).filter(matchQ);
    let goalHtml='';
    const expandedGoalKey=expandedGoal;
    const expandedGoalIdx=expandedGoalKey?parseInt(expandedGoalKey.split('_').pop()):null;
    const hasExpandedGoal=expandedGoalKey && expandedGoalKey.startsWith(team.id+'_');

    function renderGoalCard(g,i,isSelected){
        const st=calcGoalAutoStatus(g);
        const qTag=(g.quarter&&g.quarter!=='all')?'<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:'+c.bg+';color:'+c.main+';margin-left:8px">'+g.quarter+'</span>':'';
        const lkIdx=g.linkedKpi;
        const lkKpi=(lkIdx>=0&&team.kpis[lkIdx])?team.kpis[lkIdx]:null;
        const kpiTag=lkKpi?'<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:#F0F7F3;color:#3BA876;margin-left:8px">🔗 '+lkKpi.title+'</span>':'';
        const selectedStyle=isSelected?'border-color:'+c.main+';box-shadow:0 0 0 3px '+c.main+'22;background:'+c.bg+'33;':'';
        const hasWeekly=(g.weeklyData&&g.weeklyData.length>0);
        const hint=(!isSelected&&!hasExpandedGoal)?'<div style="font-size:10px;color:var(--gray-400);margin-top:8px;text-align:center">클릭하여 주차별 추이 보기 '+(hasWeekly?'📊':'')+'</div>':'';
        const selectedIcon=isSelected?'<div style="position:absolute;top:12px;left:12px;font-size:10px;font-weight:700;color:'+c.main+';background:'+c.bg+';padding:2px 8px;border-radius:6px;">📊 선택됨</div>':'';
        return `<div class="goal-item" style="${selectedStyle}cursor:pointer;" onclick="toggleGoalChart('${team.id}',${i})">
            ${selectedIcon}
            <button class="edit-btn" onclick="event.stopPropagation();openGoalModal('${team.id}',${i})">✏️</button>
            <button class="delete-btn" onclick="event.stopPropagation();deleteGoal('${team.id}',${i})">🗑</button>
            <div class="goal-item-header"><div class="goal-item-title">${g.title}${kpiTag}${qTag}</div><div class="goal-status ${st.v}">${st.l}</div></div>
            <div class="goal-item-meta"><span>목표: <strong>${g.target}</strong></span><span>현재: <strong>${g.current}</strong></span><span>마감: <strong>${g.deadline}</strong></span></div>
            <div class="progress-track"><div class="progress-fill" style="width:0%;background:${c.grad}" data-target="${g.percent}"></div><span class="progress-pct">${g.percent}%</span></div>
            ${hint}
        </div>`;
    }

    if(filteredGoals.length===0 && sq!=='all'){
        goalHtml='<div style="padding:20px;text-align:center;color:var(--gray-400);font-size:14px">이 분기에 해당하는 세부 목표가 없습니다.</div>';
    } else if(hasExpandedGoal){
        const selGoal=filteredGoals.find(g=>g._idx===expandedGoalIdx);
        const otherGoals=filteredGoals.filter(g=>g._idx!==expandedGoalIdx);
        if(selGoal){
            goalHtml+=`<div class="kpi-expanded-layout">
                <div class="kpi-expanded-left">${renderGoalCard(selGoal,selGoal._idx,true)}</div>
                <div class="kpi-expanded-right" onclick="event.stopPropagation()">${renderGoalWeeklyChart(team,selGoal,selGoal._idx,c)}</div>
            </div>`;
        }
        if(otherGoals.length>0){
            goalHtml+=`<div class="goal-list">`;
            otherGoals.forEach(g=>{ goalHtml+=renderGoalCard(g,g._idx,false); });
            goalHtml+=`</div>`;
        }
    } else {
        goalHtml+=`<div class="goal-list">`;
        filteredGoals.forEach(g=>{ goalHtml+=renderGoalCard(g,g._idx,false); });
        goalHtml+=`</div>`;
    }

    // Filter indicator
    const filterBar=sq!=='all'?`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:12px 18px;background:${c.bg};border-radius:10px;border:1px solid ${c.main}33">
        <span style="font-size:13px;font-weight:700;color:${c.main}">${sq} 필터 적용 중</span>
        <span style="font-size:12px;color:var(--gray-500)">해당 분기의 KPI와 목표만 표시됩니다</span>
        <button onclick="selectQuarter('all')" style="margin-left:auto;padding:4px 12px;border-radius:6px;border:1px solid ${c.main};background:white;color:${c.main};font-size:12px;font-weight:600;cursor:pointer">전체 보기</button>
    </div>`:'';

    const kpiTitle=sq!=='all'?`핵심 KPI — ${sq}`:'핵심 KPI';
    const goalTitle=sq!=='all'?`세부 목표 — ${sq}`:'세부 목표';

    return `
    <div class="team-page-header" style="position:relative">
        <div class="team-page-icon" style="background:${c.bg}">${team.emoji}</div>
        <div><div class="team-page-title">${team.name}</div><div class="team-page-desc">${team.desc}</div></div>
        <div style="margin-left:auto;display:flex;gap:10px;align-items:center;">
            <button onclick="openWeeklyBulkInput('${team.id}')" style="padding:8px 18px;border-radius:10px;border:1px solid ${c.main};background:${c.bg};color:${c.main};font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s" onmouseenter="this.style.background='${c.main}';this.style.color='white'" onmouseleave="this.style.background='${c.bg}';this.style.color='${c.main}'">📝 주간 입력</button>
            <button class="edit-btn" style="position:static;display:none" onclick="openEditTeamModal('${team.id}')">✏️</button>
            <button class="delete-btn" style="position:static;display:none" onclick="deleteTeam('${team.id}')">🗑</button>
        </div>
    </div>

    <div class="card" style="margin-bottom:28px">
        <div class="card-header"><div class="card-title">분기별 목표 & 달성</div></div>
        ${quarterHtml}
    </div>

    <div class="card" style="margin-bottom:28px">
        <div class="card-header"><div class="card-title">주차별 추이</div><div class="card-badge">누적</div></div>
        <div style="font-size:12px;color:var(--gray-400);margin-bottom:4px">⭐ 대표 KPI의 주간 데이터 누적 추이입니다.</div>
        ${renderWeeklyTrendChart(aggregateTeamWeeklyData(team),team.mainUnit||'',c.main,team.name,team.mainTarget)}
    </div>

    ${filterBar}

    <div class="card-header" style="margin-bottom:16px"><div class="card-title">${kpiTitle}</div>${hasExpanded?'<div style="font-size:12px;color:var(--gray-400);cursor:pointer" onclick="toggleKpiChart(null,null)">✕ 차트 닫기</div>':''}</div>
    ${kpiHtml}
    <div class="add-btn" onclick="openKpiModal('${team.id}',-1)">+ KPI 추가</div>

    <div class="card-header" style="margin-top:28px;margin-bottom:16px"><div class="card-title">${goalTitle}</div>${hasExpandedGoal?'<div style="font-size:12px;color:var(--gray-400);cursor:pointer" onclick="toggleGoalChart(null,null)">✕ 차트 닫기</div>':''}</div>
    ${goalHtml}
    <div class="add-btn" onclick="openGoalModal('${team.id}',-1)">+ 목표 추가</div>`;
}

function saveCompany(){
    DATA.company.annualTarget=parseFloat(document.getElementById('m_at').value)||0;
    // annualCurrent, q2Current는 팀 합산으로 자동 계산 (수동 입력 안 함)
    DATA.company.quarters.forEach((q,i)=>{
        q.target=parseFloat(document.getElementById('m_qt'+i).value)||0;
        // q.current는 recalcCompanyFromTeams()에서 자동 반영
    });
    saveData();closeModal();renderContent();
}

function addTeam(){
    const name=document.getElementById('m_tn').value.trim();
    if(!name){alert('팀 이름을 입력해주세요.');return;}
    const id='team_'+Date.now();
    DATA.teams.push({
        id, name, emoji:document.getElementById('m_te').value,
        colorIdx:parseInt(document.getElementById('m_tc').value),
        desc:document.getElementById('m_td').value,
        mainGoal:document.getElementById('m_tg').value,
        mainCurrent:parseFloat(document.getElementById('m_tmc').value)||0,
        mainTarget:parseFloat(document.getElementById('m_tmt').value)||0,
        mainUnit:document.getElementById('m_tmu').value||'건',
        quarters:[
            {label:'Q1 (1~3월)',target:'',current:'',percent:0},
            {label:'Q2 (4~6월)',target:'',current:'',percent:0},
            {label:'Q3 (7~9월)',target:'',current:'',percent:0},
            {label:'Q4 (10~12월)',target:'',current:'',percent:0}
        ],
        kpis:[],goals:[]
    });
    saveData();closeModal();activeTab=id;renderTabs();renderContent();
}

function saveTeamEdit(teamId){
    const t=DATA.teams.find(x=>x.id===teamId);if(!t)return;
    t.name=document.getElementById('m_tn').value.trim();
    t.emoji=document.getElementById('m_te').value;
    t.colorIdx=parseInt(document.getElementById('m_tc').value);
    t.desc=document.getElementById('m_td').value;
    t.mainGoal=document.getElementById('m_tg').value;
    t.mainCurrent=parseFloat(document.getElementById('m_tmc').value)||0;
    t.mainTarget=parseFloat(document.getElementById('m_tmt').value)||0;
    t.mainUnit=document.getElementById('m_tmu').value||'건';
    saveData();closeModal();renderTabs();renderContent();
}

function deleteTeam(teamId){
    if(!confirm('이 팀을 삭제하시겠습니까?'))return;
    DATA.teams=DATA.teams.filter(t=>t.id!==teamId);
    saveData();activeTab='overview';renderTabs();renderContent();
}

function openKpiModal(teamId,idx){
    const t=DATA.teams.find(x=>x.id===teamId);if(!t)return;
    const isNew=idx<0;
    const k=isNew?{title:'',current:'',target:'',percent:0,quarter:selectedQuarter!=='all'?selectedQuarter:'all'}:t.kpis[idx];
    const qOpts=['all','Q1','Q2','Q3','Q4'].map(q=>`<option value="${q}" ${(k.quarter||'all')===q?'selected':''}>${q==='all'?'전체 (연간)':q}</option>`).join('');
    const isPri=k.isPrimary||false;
    const isRev=k.isRevenue||false;
    const curNum=extractNumber(k.current);
    const theUnit=extractUnit(k.current)||extractUnit(k.target)||'';
    const tgtNum=extractNumber(k.target);
    openModal(`
        <div class="modal-title">${isNew?'KPI 추가':'KPI 수정'}</div>
        <div class="form-group"><label class="form-label">KPI 이름</label><input class="form-input" id="m_kt" value="${k.title}" placeholder="예: 월 매출"></div>
        <div class="form-group"><label class="form-label">단위</label>${unitSelect('m_ku',theUnit)}</div>
        <div class="form-row">
            <div class="form-group"><label class="form-label">현재 수치</label><input class="form-input" id="m_kcn" type="number" step="any" value="${curNum||''}" placeholder="0" oninput="autoCalcPercent('m_kcn','m_ktn','m_kp')"></div>
            <div class="form-group"><label class="form-label">목표 수치</label><input class="form-input" id="m_ktn" type="number" step="any" value="${tgtNum||''}" placeholder="0" oninput="autoCalcPercent('m_kcn','m_ktn','m_kp')"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label class="form-label">달성률</label><div class="auto-pct"><strong id="m_kp">${k.percent||0}</strong><span>% (자동 계산)</span></div></div>
            <div class="form-group"><label class="form-label">해당 분기</label><select class="form-select" id="m_kq">${qOpts}</select></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
            <div style="padding:14px 16px;border-radius:10px;background:${isPri?'#EEFBF4':'var(--gray-50)'};display:flex;align-items:center;gap:10px;cursor:pointer" onclick="document.getElementById('m_kpri').checked=!document.getElementById('m_kpri').checked;this.style.background=document.getElementById('m_kpri').checked?'#EEFBF4':'var(--gray-50)'">

// 문자열에서 첫 번째 숫자 추출 ('0.6억' → 0.6, '3,200만원' → 3200, '42%' → 42)
function extractNumber(str){
    if(typeof str==='number') return str;
    if(!str) return 0;
    const cleaned=String(str).replace(/,/g,'');
    const m=cleaned.match(/-?[\d.]+/);
    return m ? parseFloat(m[0]) : 0;
}
// 문자열에서 단위 추출 ('0.6억' → '억', '3건' → '건')
function extractUnit(str){
    if(!str||typeof str==='number') return '';
    const s=String(str).replace(/,/g,'').trim();
    const m=s.match(/[\d.]+\s*(.*)/);
    return (m&&m[1])?m[1].trim():'';
}
const UNITS=['억','만원','원','건','%','명','점','개','일','만','kg','회','곳','종'];
const MONEY_UNITS=['원','만원','억'];
// 금액 자동 환산: 원 단위 숫자를 적정 한국 화폐 단위로 변환
// 예: formatMoney(500000000) → {display:'5억', num:5, unit:'억'}
//     formatMoney(35000000) → {display:'3,500만원', num:3500, unit:'만원'}
//     formatMoney(1500000) → {display:'150만원', num:150, unit:'만원'}
//     formatMoney(8000) → {display:'8,000원', num:8000, unit:'원'}
function formatMoney(rawNum, fromUnit){
    if(!fromUnit || !MONEY_UNITS.includes(fromUnit)) return null;
    // 원 기준으로 환산
    let won=rawNum;
    if(fromUnit==='만원') won=rawNum*10000;
    else if(fromUnit==='억') won=rawNum*100000000;
    const abs=Math.abs(won);
    const sign=won<0?'-':'';
    const unitRank={'원':0,'만원':1,'억':2};
    const minRank=unitRank[fromUnit]||0;
    if(abs>=100000000 && minRank<=2){ // 1억 이상 → X.XX억
        const v=Math.round(won/100000000*100)/100;
        return {display:sign+formatComma(Math.abs(v))+'억', num:v, unit:'억'};
    } else if(abs>=10000 && minRank<=1){ // 1만원 이상 → X,XXX만원
        const v=Math.round(won/10000*10)/10;
        return {display:sign+formatComma(Math.abs(v))+'만원', num:v, unit:'만원'};
    } else if(minRank<=0){ // 1만원 미만 → X,XXX원
        const v=Math.round(won);
        return {display:sign+formatComma(Math.abs(v))+'원', num:v, unit:'원'};
    } else {
        // 입력 단위 유지 (예: 0.6억 → 0.6억)
        return {display:sign+formatComma(Math.abs(rawNum))+fromUnit, num:rawNum, unit:fromUnit};
    }
}
function formatComma(n){
    const parts=n.toString().split('.');
    parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
    return parts.join('.');
}
// 금액 단위일 때 값+단위 문자열을 최적 형태로 변환
function autoFormatValue(num, unit){
    if(!MONEY_UNITS.includes(unit)) return num+unit;
    const result=formatMoney(num, unit);
    if(!result) return num+unit;
    return result.display;
}
function unitSelect(id,selected){
    return '<select class="form-select" id="'+id+'" style="width:90px;flex-shrink:0">'+
        UNITS.map(u=>'<option value="'+u+'"'+(u===selected?' selected':'')+'>'+u+'</option>').join('')+
        '<option value=""'+((!selected||!UNITS.includes(selected))?' selected':'')+'>직접입력</option></select>';
}
// 수치 입력 시 달성률 자동 계산
function autoCalcPercent(curId,tgtId,pctId){
    const c=parseFloat(document.getElementById(curId).value)||0;
    const t=parseFloat(document.getElementById(tgtId).value)||0;
    const el=document.getElementById(pctId);
    const v=t>0?Math.round((c/t)*100):0;
    if(el.tagName==='INPUT'||el.tagName==='SELECT') el.value=v;
    else el.textContent=v;
}

// 대표 KPI들의 합산으로 분기별 달성 + 팀 메인 지표 자동 계산
function recalcFromPrimaryKpis(team){
    const primaryKpis=team.kpis.filter(k=>k.isPrimary);
    if(primaryKpis.length===0) return; // 대표 KPI 없으면 수동 모드 유지
    const qMap={'Q1':0,'Q2':1,'Q3':2,'Q4':3};
    const curQi=Math.floor(new Date().getMonth()/3);
    // 분기별 합산 계산
    const qSums=[0,0,0,0];
    const qTargetSums=[0,0,0,0];
    let totalSum=0;
    primaryKpis.forEach(k=>{
        const val=extractNumber(k.current);
        const tgt=extractNumber(k.target);
        if(k.quarter && k.quarter!=='all' && qMap[k.quarter]!==undefined){
            // 특정 분기에 배정된 KPI
            qSums[qMap[k.quarter]]+=val;
            qTargetSums[qMap[k.quarter]]+=tgt;
        } else {
            // 'all' (연간) KPI → 현재 분기에 반영
            qSums[curQi]+=val;
            qTargetSums[curQi]+=tgt;
        }
        totalSum+=val;
    });
    // 팀 메인 지표 업데이트
    team.mainCurrent=Math.round(totalSum*100)/100;
    // 분기별 달성 업데이트
    if(team.quarters){
        for(let i=0;i<4;i++){
            if(team.quarters[i] && qSums[i]>0){
                team.quarters[i].current=autoFormatValue(qSums[i],team.mainUnit);
                const tgtNum=extractNumber(team.quarters[i].target);
                team.quarters[i].percent=tgtNum>0?Math.round((qSums[i]/tgtNum)*100):0;
            }
        }
    }
}

function deleteKpi(teamId,idx){

    const t=DATA.teams.find(x=>x.id===teamId);if(!t)return;

    t.goals.forEach(g=>{
        if(g.linkedKpi===idx) g.linkedKpi=-1;
        else if(g.linkedKpi>idx) g.linkedKpi--;
    });
    t.kpis.splice(idx,1);
    recalcFromPrimaryKpis(t);
    saveData();renderContent();
}

// 세부 목표들의 합산으로 연결된 KPI의 현재 수치 자동 계산
function recalcKpiFromGoals(team){
    if(!team.kpis||!team.goals) return;
    // KPI별로 연결된 세부 목표 수집
    team.kpis.forEach((kpi,kIdx)=>{
        const linkedGoals=team.goals.filter(g=>g.linkedKpi===kIdx);
        if(linkedGoals.length===0) return; // 연결된 목표 없으면 수동 유지
        // 합산
        let sumCurrent=0, sumTarget=0;
        linkedGoals.forEach(g=>{
            sumCurrent+=extractNumber(g.current);
            sumTarget+=extractNumber(g.target);
        });
        // KPI 수치 업데이트
        kpi.current=autoFormatValue(sumCurrent,team.mainUnit);
        kpi.percent=sumTarget>0?Math.round((sumCurrent/sumTarget)*100):0;
    });
}

    recalcKpiFromGoals(t);
    recalcFromPrimaryKpis(t);
    saveData();renderContent();
}

function getKpiWeeklyData(team,kpi,kIdx){
    // KPI에 연결된 세부 목표가 있으면 목표들의 weeklyData를 주차별로 합산
    const linkedGoals=(team.goals||[]).filter(g=>g.linkedKpi===kIdx);
    if(linkedGoals.length>0){
        const weekMap=new Map();
        linkedGoals.forEach(g=>{
            (g.weeklyData||[]).forEach(w=>{
                const existing=weekMap.get(w.label)||{value:0,links:[]};
                existing.value+=w.value;
                if(w.link) existing.links.push({goal:g.title,link:w.link});
                weekMap.set(w.label, existing);
            });
        });
        if(weekMap.size>0){
            const entries=Array.from(weekMap.entries()).map(([label,data])=>({label,value:Math.round(data.value*100)/100,links:data.links}));
            return sortWeeklyData(entries);
        }
    }
    // 연결된 목표가 없거나 목표에 주간 데이터가 없으면 KPI 자체 데이터 사용
    return sortWeeklyData(kpi.weeklyData||[]);
}

function renderWeeklyChart(team,kpi,kIdx,color){
    const wd=getKpiWeeklyData(team,kpi,kIdx);

    if(wd.length===0){
        return `<div>
            <div style="font-size:16px;font-weight:800;color:var(--gray-700);margin-bottom:6px">📊 ${kpi.title} — 주차별 추이</div>
            <div style="text-align:center;padding:40px 20px;color:var(--gray-400);font-size:14px;background:var(--gray-50);border-radius:12px;margin:20px 0">
                <div style="font-size:32px;margin-bottom:12px">📈</div>
                아직 주차별 데이터가 없습니다<br><span style="font-size:12px">상단의 <strong>📝 주간 입력</strong> 버튼으로 수치를 입력하세요</span>
            </div>
        </div>`;
    }

    // Stats cards
    const lastVal=wd[wd.length-1].value;
    const prevVal=wd.length>=2?wd[wd.length-2].value:null;
    const maxVal=Math.max(...wd.map(w=>w.value));
    const minVal=Math.min(...wd.map(w=>w.value));
    const avgVal=Math.round((wd.reduce((s,w)=>s+w.value,0)/wd.length)*100)/100;
    let changePct=0, changeDir='same';
    if(prevVal!==null && prevVal>0){
        changePct=Math.round(((lastVal-prevVal)/prevVal)*100);
        changeDir=changePct>0?'up':changePct<0?'down':'same';
    }
    const changeLabel=changeDir==='up'?'▲'+Math.abs(changePct)+'%':changeDir==='down'?'▼'+Math.abs(changePct)+'%':'—';
    const changeColor=changeDir==='up'?'#3BA876':changeDir==='down'?'#dc2626':'var(--gray-400)';

    const statsHtml=`<div class="weekly-stats">
        <div class="weekly-stat-card"><div class="stat-label">최신 (${wd[wd.length-1].label})</div><div class="stat-value" style="color:${color.main}">${lastVal}</div></div>
        <div class="weekly-stat-card"><div class="stat-label">전주 대비</div><div class="stat-value" style="color:${changeColor}">${changeLabel}</div></div>
        <div class="weekly-stat-card"><div class="stat-label">최고</div><div class="stat-value">${maxVal}</div></div>
        <div class="weekly-stat-card"><div class="stat-label">평균</div><div class="stat-value">${avgVal}</div></div>
    </div>`;

    // SVG Line Chart
    const W=600, H=200, padL=50, padR=20, padT=20, padB=36;
    const chartW=W-padL-padR, chartH=H-padT-padB;
    const yMin=Math.min(...wd.map(w=>w.value))*0.85;
    const yMax=Math.max(...wd.map(w=>w.value))*1.1||1;
    const yRange=yMax-yMin||1;

    // Grid lines
    const gridCount=4;
    let gridLines='';
    for(let g=0;g<=gridCount;g++){
        const y=padT+(chartH/gridCount)*g;
        const val=Math.round(yMax-((yMax-yMin)/gridCount)*g);
        gridLines+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--gray-100)" stroke-width="1"/>`;
        gridLines+=`<text x="${padL-8}" y="${y+4}" text-anchor="end" fill="var(--gray-400)" font-size="11" font-weight="600">${val}</text>`;
    }

    // Points and path
    const points=wd.map((w,i)=>{
        const x=padL+(wd.length===1?chartW/2:(i/(wd.length-1))*chartW);
        const y=padT+((yMax-w.value)/yRange)*chartH;
        return {x,y,label:w.label,value:w.value};
    });

    let pathD='M'+points.map(p=>p.x+','+p.y).join(' L');

    // Gradient area
    let areaD=pathD+` L${points[points.length-1].x},${padT+chartH} L${points[0].x},${padT+chartH} Z`;

    // Labels on X axis
    let xLabels='';
    points.forEach((p,i)=>{
        xLabels+=`<text x="${p.x}" y="${H-6}" text-anchor="middle" fill="var(--gray-400)" font-size="11" font-weight="600">${wd[i].label}</text>`;
    });

    // Dots
    let dots='';
    points.forEach((p,i)=>{
        dots+=`<circle class="line-chart-dot" cx="${p.x}" cy="${p.y}" r="5" stroke="${color.main}" fill="white"
            onmouseenter="showChartTip(evt,${p.x},${p.y},'${wd[i].label}: ${wd[i].value}')"
            onmouseleave="hideChartTip()"/>`;
    });

    const svgHtml=`<div class="line-chart-container" id="lineChartWrap_${kIdx}">
        <div class="line-chart-tooltip" id="chartTip_${kIdx}"></div>
        <svg class="line-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
            <defs>
                <linearGradient id="areaGrad_${kIdx}" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="${color.main}" stop-opacity="0.2"/>
                    <stop offset="100%" stop-color="${color.main}" stop-opacity="0.02"/>
                </linearGradient>
            </defs>
            ${gridLines}
            <path d="${areaD}" fill="url(#areaGrad_${kIdx})"/>
            <path d="${pathD}" fill="none" stroke="${color.main}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            ${dots}
            ${xLabels}
        </svg>
    </div>`;

    // Data table
    let tableRows='';
    wd.forEach((w,i)=>{
        let changeCell='-';
        if(i>0){
            const d=w.value-wd[i-1].value;
            const p=wd[i-1].value>0?Math.round((d/wd[i-1].value)*100):0;
            if(d>0) changeCell='<span style="color:#3BA876;font-weight:700">▲ +'+d+' (+'+p+'%)</span>';
            else if(d<0) changeCell='<span style="color:#dc2626;font-weight:700">▼ '+d+' ('+p+'%)</span>';
            else changeCell='<span style="color:var(--gray-400)">— 동일</span>';
        }
        let kpiLinkHtml='<span style="color:var(--gray-300);font-size:11px">—</span>';
        if(w.links&&w.links.length>0){
            kpiLinkHtml=w.links.map(l=>`<a href="${l.link}" target="_blank" rel="noopener" style="color:${color.main};font-size:11px;text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px" title="${l.goal}: ${l.link}">📎 ${l.goal} ↗</a>`).join('');
        } else if(w.link){
            kpiLinkHtml=`<a href="${w.link}" target="_blank" rel="noopener" style="color:${color.main};font-weight:700;font-size:12px;text-decoration:none">📎 결과물 ↗</a>`;
        }
        tableRows+=`<tr><td style="font-weight:600">${w.label}</td><td style="font-weight:800;color:${color.main}">${w.value}</td><td class="change-cell">${changeCell}</td><td style="text-align:center">${kpiLinkHtml}</td></tr>`;
    });
    const tableHtml=wd.length>1?`<table class="weekly-data-table">
        <thead><tr><th>주차</th><th>수치</th><th>변화</th><th>결과물</th></tr></thead>
        <tbody>${tableRows}</tbody>
    </table>`:'';

    return `<div>
        <div style="font-size:16px;font-weight:800;color:var(--gray-700);margin-bottom:16px">📊 ${kpi.title} — 주차별 추이</div>
        ${statsHtml}
        ${svgHtml}
        ${tableHtml}
    </div>`;
}

// Chart tooltip helpers
function showChartTip(evt,x,y,text){
    const svg=evt.target.closest('svg');
    const wrap=svg.parentElement;
    const tip=wrap.querySelector('.line-chart-tooltip');
    if(!tip)return;
    const rect=svg.getBoundingClientRect();
    const viewBox=svg.viewBox.baseVal;
    const scaleX=rect.width/viewBox.width;
    const scaleY=rect.height/viewBox.height;
    tip.textContent=text;
    tip.style.left=(x*scaleX)+'px';
    tip.style.top=(y*scaleY-10)+'px';
    tip.style.opacity='1';
}
function hideChartTip(){
    document.querySelectorAll('.line-chart-tooltip').forEach(t=>t.style.opacity='0');
}

function recalcKpiFromWeekly(kpi,team){
    const wd=kpi.weeklyData;
    if(!wd||wd.length===0) return;
    const sum=wd.reduce((s,w)=>s+w.value,0);
    const unit=team.mainUnit||extractUnit(kpi.current)||'';
    kpi.current=autoFormatValue(sum,unit);
    const tgtNum=extractNumber(kpi.target);
    kpi.percent=tgtNum>0?Math.round((sum/tgtNum)*100):0;
}

function addWeeklyData(teamId,kIdx){
    const t=DATA.teams.find(x=>x.id===teamId);if(!t||!t.kpis[kIdx])return;
    const label=document.getElementById('wk_label_'+kIdx).value.trim();
    const value=parseFloat(document.getElementById('wk_value_'+kIdx).value);
    if(!label||isNaN(value)){showToast('주차명과 수치를 입력하세요','error');return;}
    if(!t.kpis[kIdx].weeklyData) t.kpis[kIdx].weeklyData=[];
    t.kpis[kIdx].weeklyData.push({label:label,value:value});

function removeLastWeekly(teamId,kIdx){
