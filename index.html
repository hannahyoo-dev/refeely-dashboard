function renderGoalWeeklyChart(team,goal,gIdx,color){
    const wd=sortWeeklyData(goal.weeklyData||[]);

    if(wd.length===0){
        return `<div>
            <div style="font-size:16px;font-weight:800;color:var(--gray-700);margin-bottom:6px">📊 ${goal.title} — 주차별 추이</div>
            <div style="text-align:center;padding:40px 20px;color:var(--gray-400);font-size:14px;background:var(--gray-50);border-radius:12px;margin:20px 0">
                <div style="font-size:32px;margin-bottom:12px">📈</div>
                아직 주차별 데이터가 없습니다<br><span style="font-size:12px">상단의 <strong>📝 주간 입력</strong> 버튼으로 수치를 입력하세요</span>
            </div>
        </div>`;
    }

    const lastVal=wd[wd.length-1].value;
    const prevVal=wd.length>=2?wd[wd.length-2].value:null;
    const maxVal=Math.max(...wd.map(w=>w.value));
    const minVal=Math.min(...wd.map(w=>w.value));
    const avgVal=Math.round((wd.reduce((s,w)=>s+w.value,0)/wd.length)*100)/100;
    let changePct=0, changeDir='same';
    if(prevVal!==null && prevVal>0){
        changePct=Math.round(((lastVal-prevVal)/prevVal)*100);
        changeDir=changePct>0?'up':changePct<0?'down':'same';
    }
    const changeLabel=changeDir==='up'?'▲'+Math.abs(changePct)+'%':changeDir==='down'?'▼'+Math.abs(changePct)+'%':'—';
    const changeColor=changeDir==='up'?'#3BA876':changeDir==='down'?'#dc2626':'var(--gray-400)';

    const statsHtml=`<div class="weekly-stats">
        <div class="weekly-stat-card"><div class="stat-label">최신 (${wd[wd.length-1].label})</div><div class="stat-value" style="color:${color.main}">${lastVal}</div></div>
        <div class="weekly-stat-card"><div class="stat-label">전주 대비</div><div class="stat-value" style="color:${changeColor}">${changeLabel}</div></div>
        <div class="weekly-stat-card"><div class="stat-label">최고</div><div class="stat-value">${maxVal}</div></div>
        <div class="weekly-stat-card"><div class="stat-label">평균</div><div class="stat-value">${avgVal}</div></div>
    </div>`;

    const uid='g'+gIdx;
    const W=600, H=200, padL=50, padR=20, padT=20, padB=36;
    const chartW=W-padL-padR, chartH=H-padT-padB;
    const yMin=Math.min(...wd.map(w=>w.value))*0.85;
    const yMax=Math.max(...wd.map(w=>w.value))*1.1||1;
    const yRange=yMax-yMin||1;

    const gridCount=4;
    let gridLines='';
    for(let g=0;g<=gridCount;g++){
        const y=padT+(chartH/gridCount)*g;
        const val=Math.round(yMax-((yMax-yMin)/gridCount)*g);
        gridLines+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--gray-100)" stroke-width="1"/>`;
        gridLines+=`<text x="${padL-8}" y="${y+4}" text-anchor="end" fill="var(--gray-400)" font-size="11" font-weight="600">${val}</text>`;
    }

    const points=wd.map((w,i)=>{
        const x=padL+(wd.length===1?chartW/2:(i/(wd.length-1))*chartW);
        const y=padT+((yMax-w.value)/yRange)*chartH;
        return {x,y,label:w.label,value:w.value};
    });

    let pathD='M'+points.map(p=>p.x+','+p.y).join(' L');
    let areaD=pathD+` L${points[points.length-1].x},${padT+chartH} L${points[0].x},${padT+chartH} Z`;

    let xLabels='';
    points.forEach((p,i)=>{
        xLabels+=`<text x="${p.x}" y="${H-6}" text-anchor="middle" fill="var(--gray-400)" font-size="11" font-weight="600">${wd[i].label}</text>`;
    });

    let dots='';
    points.forEach((p,i)=>{
        dots+=`<circle class="line-chart-dot" cx="${p.x}" cy="${p.y}" r="5" stroke="${color.main}" fill="white"
            onmouseenter="showChartTip(evt,${p.x},${p.y},'${wd[i].label}: ${wd[i].value}')"
            onmouseleave="hideChartTip()"/>`;
    });

    const svgHtml=`<div class="line-chart-container" id="lineChartWrap_${uid}">
        <div class="line-chart-tooltip" id="chartTip_${uid}"></div>
        <svg class="line-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
            <defs>
                <linearGradient id="areaGrad_${uid}" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="${color.main}" stop-opacity="0.2"/>
                    <stop offset="100%" stop-color="${color.main}" stop-opacity="0.02"/>
                </linearGradient>
            </defs>
            ${gridLines}
            <path d="${areaD}" fill="url(#areaGrad_${uid})"/>
            <path d="${pathD}" fill="none" stroke="${color.main}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            ${dots}
            ${xLabels}
        </svg>
    </div>`;

    let tableRows='';
    wd.forEach((w,i)=>{
        let changeCell='-';
        if(i>0){
            const d=w.value-wd[i-1].value;
            const p=wd[i-1].value>0?Math.round((d/wd[i-1].value)*100):0;
            if(d>0) changeCell='<span style="color:#3BA876;font-weight:700">▲ +'+d+' (+'+p+'%)</span>';
            else if(d<0) changeCell='<span style="color:#dc2626;font-weight:700">▼ '+d+' ('+p+'%)</span>';
            else changeCell='<span style="color:var(--gray-400)">— 동일</span>';
        }
        const linkHtml=w.link?`<a href="${w.link}" target="_blank" rel="noopener" style="color:${color.main};font-weight:700;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:3px" title="${w.link}">📎 결과물 보기 ↗</a>`:'<span style="color:var(--gray-300);font-size:11px">—</span>';
        tableRows+=`<tr><td style="font-weight:600">${w.label}</td><td style="font-weight:800;color:${color.main}">${w.value}</td><td class="change-cell">${changeCell}</td><td style="text-align:center">${linkHtml}</td></tr>`;
    });
    const tableHtml=wd.length>1?`<table class="weekly-data-table">
        <thead><tr><th>주차</th><th>수치</th><th>변화</th><th>결과물</th></tr></thead>
        <tbody>${tableRows}</tbody>
    </table>`:'';

    return `<div>
        <div style="font-size:16px;font-weight:800;color:var(--gray-700);margin-bottom:16px">📊 ${goal.title} — 주차별 추이</div>
        ${statsHtml}
        ${svgHtml}
        ${tableHtml}
    </div>`;
}

    goal.current=autoFormatValue(sum,unit);

// ===== WEEKLY BULK INPUT =====
function openWeeklyBulkInput(teamId){
    const t=DATA.teams.find(x=>x.id===teamId);if(!t)return;
    const c=COLORS[t.colorIdx%COLORS.length];
    const now=new Date();
    function getMonday(d){ const dt=new Date(d); const day=dt.getDay(); const diff=dt.getDate()-day+(day===0?-6:1); dt.setDate(diff); dt.setHours(0,0,0,0); return dt; }
    function fmtMD(d){ return (d.getMonth()+1)+'월 '+d.getDate()+'일'; }
    function weekLabel(mon){
        const sun=new Date(mon); sun.setDate(mon.getDate()+6);
        const m=mon.getMonth()+1;
        const weekNames=['첫째','둘째','셋째','넷째','다섯째'];
        const wIdx=Math.ceil(mon.getDate()/7)-1;
        const wName=weekNames[Math.min(wIdx,4)];
        return { value: fmtMD(mon)+' ~ '+fmtMD(sun), display: m+'월 '+wName+'주 ('+fmtMD(mon)+' ~ '+fmtMD(sun)+')' };
    }
    // 해당 주차에 이미 데이터가 있는지 확인
    function hasDataForWeek(label){
        const inKpi=t.kpis.some(k=>k.weeklyData&&k.weeklyData.some(w=>w.label===label));
        const inGoal=t.goals.some(g=>g.weeklyData&&g.weeklyData.some(w=>w.label===label));
        return inKpi||inGoal;
    }
    const thisMon=getMonday(now);
    let weekOptions='';
    for(let w=-4;w<=4;w++){
        const mon=new Date(thisMon); mon.setDate(thisMon.getDate()+w*7);
        const wk=weekLabel(mon);
        const exists=hasDataForWeek(wk.value);
        weekOptions+=`<option value="${wk.value}" ${w===0?'selected':''}>${exists?'✅ ':''}${wk.display}</option>`;
    }

    // 테이블 렌더 (주차 변경 시 재호출됨)
    window._bulkTeamId=teamId;
    window._bulkBuildRows=function(selLabel){
        let kH='',gH='';
        t.kpis.forEach((k,i)=>{
            const unit=extractUnit(k.current)||extractUnit(k.target)||'';
            const linkedGoals=t.goals.filter(g=>g.linkedKpi===i);
            const hasLinked=linkedGoals.length>0;
            const existing=(k.weeklyData||[]).find(w=>w.label===selLabel);
            const existVal=existing?existing.value:'';
            const linkedNames=linkedGoals.map(g=>g.title).join(', ');
            if(hasLinked){
                kH+=`<tr style="background:var(--gray-50)">
                    <td style="padding:10px 12px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${c.main};margin-right:8px"></span>${k.title}${k.isPrimary?' ⭐':''}</td>
                    <td style="padding:10px 8px;text-align:center"><div style="font-size:12px;color:var(--gray-400);font-weight:600">🔗 세부 목표에서 자동 합산</div><div style="font-size:10px;color:var(--gray-300);margin-top:2px">${linkedNames}</div></td>
                    <td style="padding:10px 8px;color:var(--gray-400);font-size:12px;text-align:center">${unit}</td>
                </tr>`;
            } else {
                kH+=`<tr>
                    <td style="padding:10px 12px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${c.main};margin-right:8px"></span>${k.title}${k.isPrimary?' ⭐':''}</td>
                    <td style="padding:10px 8px"><input class="form-input" id="bk_k${i}" type="number" step="any" value="${existVal}" placeholder="${existing?'':'수치 입력'}" style="font-size:13px;text-align:center;padding:8px;${existing?'background:#EEFBF4;border-color:#50CC93':''}">${existing?'<div style="font-size:9px;color:#3BA876;text-align:center;margin-top:2px">기존값</div>':''}</td>
                    <td style="padding:10px 8px;color:var(--gray-400);font-size:12px;text-align:center">${unit}</td>
                </tr>`;
            }
        });
        t.goals.forEach((g,i)=>{
            const unit=extractUnit(g.current)||extractUnit(g.target)||'';
            const existing=(g.weeklyData||[]).find(w=>w.label===selLabel);
            const existVal=existing?existing.value:'';
            const existLink=existing?existing.link||'':'';
            gH+=`<tr>
                <td style="padding:10px 12px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${c.main};margin-right:8px;opacity:.5"></span>${g.title}</td>
                <td style="padding:10px 8px"><input class="form-input" id="bk_g${i}" type="number" step="any" value="${existVal}" placeholder="${existing?'':'수치 입력'}" style="font-size:13px;text-align:center;padding:8px;${existing?'background:#EEFBF4;border-color:#50CC93':''}">${existing?'<div style="font-size:9px;color:#3BA876;text-align:center;margin-top:2px">기존값</div>':''}</td>
                <td style="padding:10px 8px;color:var(--gray-400);font-size:12px;text-align:center">${unit}</td>
            </tr>
            <tr><td colspan="3" style="padding:0 12px 10px"><input class="form-input" id="bk_gl${i}" value="${existLink}" placeholder="🔗 결과물 링크 (URL)" style="font-size:12px;padding:6px 10px;${existLink?'background:#EEF2FF;border-color:#5B7FD6':''}"></td></tr>`;
        });
        return {kH,gH};
    };

    const initRows=window._bulkBuildRows(weekLabel(thisMon).value);
    const isEdit=hasDataForWeek(weekLabel(thisMon).value);

    openModal(`
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
            <div style="width:40px;height:40px;border-radius:12px;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:20px">${t.emoji}</div>
            <div>
                <div class="modal-title" style="margin-bottom:2px">${t.name} — 주간 입력</div>
                <div style="font-size:12px;color:var(--gray-400)">이번 주 수치를 한번에 입력하세요. 빈 칸은 건너뜁니다.</div>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;padding:14px 16px;background:var(--gray-50);border-radius:12px">
            <label style="font-size:13px;font-weight:700;color:var(--gray-700);white-space:nowrap">📅 주차</label>
            <select class="form-select" id="bk_week" style="font-size:13px;font-weight:700;padding:8px 12px;flex:1" onchange="bulkWeekChanged()">${weekOptions}</select>
        </div>
        <div id="bk_editBadge" style="margin-bottom:16px;padding:0 4px;font-size:11px;color:#3BA876;font-weight:600;${isEdit?'':'display:none'}">✅ 이미 입력된 주차입니다 — 수정하면 기존 값을 덮어씁니다</div>
        ${t.kpis.length>0?`
        <div style="font-size:13px;font-weight:800;color:${c.main};margin-bottom:10px;display:flex;align-items:center;gap:6px"><span style="font-size:15px">📊</span> 핵심 KPI</div>
        <table style="width:100%;border-collapse:collapse;margin-bottom:20px">
            <thead><tr style="border-bottom:2px solid var(--gray-200)">
                <th style="text-align:left;padding:8px 12px;font-size:11px;color:var(--gray-400);font-weight:700">항목</th>
                <th style="text-align:center;padding:8px;font-size:11px;color:var(--gray-400);font-weight:700;width:120px">수치</th>
                <th style="text-align:center;padding:8px;font-size:11px;color:var(--gray-400);font-weight:700;width:50px">단위</th>
            </tr></thead>
            <tbody id="bk_kpiBody">${initRows.kH}</tbody>
        </table>`:''}
        ${t.goals.length>0?`
        <div style="font-size:13px;font-weight:800;color:${c.main};margin-bottom:10px;display:flex;align-items:center;gap:6px"><span style="font-size:15px">🎯</span> 세부 목표</div>
        <table style="width:100%;border-collapse:collapse;margin-bottom:20px">
            <thead><tr style="border-bottom:2px solid var(--gray-200)">
                <th style="text-align:left;padding:8px 12px;font-size:11px;color:var(--gray-400);font-weight:700">항목</th>
                <th style="text-align:center;padding:8px;font-size:11px;color:var(--gray-400);font-weight:700;width:120px">수치</th>
                <th style="text-align:center;padding:8px;font-size:11px;color:var(--gray-400);font-weight:700;width:50px">단위</th>
            </tr></thead>
            <tbody id="bk_goalBody">${initRows.gH}</tbody>
        </table>`:''}
        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" style="padding:10px 28px;font-size:14px" onclick="saveWeeklyBulk('${teamId}')">💾 일괄 저장</button>
        </div>
    `,true);
}

function bulkWeekChanged(){
    const sel=document.getElementById('bk_week').value;
    const rows=window._bulkBuildRows(sel);
    const kBody=document.getElementById('bk_kpiBody');
    const gBody=document.getElementById('bk_goalBody');
    if(kBody) kBody.innerHTML=rows.kH;
    if(gBody) gBody.innerHTML=rows.gH;
    // 기존 데이터 여부에 따라 안내 표시
    const t=DATA.teams.find(x=>x.id===window._bulkTeamId);
    const badge=document.getElementById('bk_editBadge');
    if(t&&badge){
        const hasAny=t.kpis.some(k=>(k.weeklyData||[]).some(w=>w.label===sel))||t.goals.some(g=>(g.weeklyData||[]).some(w=>w.label===sel));
        badge.style.display=hasAny?'':'none';
    }
}

function saveWeeklyBulk(teamId){
    const t=DATA.teams.find(x=>x.id===teamId);if(!t)return;
    const label=document.getElementById('bk_week').value.trim();
    if(!label){showToast('주차명을 입력하세요','error');return;}

    let savedCount=0;

    // KPI weekly data — 같은 주차 있으면 덮어쓰기
    t.kpis.forEach((k,i)=>{
        const el=document.getElementById('bk_k'+i);
        if(!el||el.value==='')return;
        const val=parseFloat(el.value);
        if(isNaN(val))return;
        if(!k.weeklyData) k.weeklyData=[];
        const existing=k.weeklyData.findIndex(w=>w.label===label);
        if(existing>=0) k.weeklyData[existing].value=val;
        else k.weeklyData.push({label:label,value:val});
        k.weeklyData=sortWeeklyData(k.weeklyData);
        recalcKpiFromWeekly(k,t);
        savedCount++;
    });

    // Goal weekly data — 같은 주차 있으면 덮어쓰기
    t.goals.forEach((g,i)=>{
        const el=document.getElementById('bk_g'+i);
        if(!el||el.value==='')return;
        const val=parseFloat(el.value);
        if(isNaN(val))return;
        const linkEl=document.getElementById('bk_gl'+i);
        const link=linkEl?linkEl.value.trim():'';
        if(!g.weeklyData) g.weeklyData=[];
        const existing=g.weeklyData.findIndex(w=>w.label===label);
        if(existing>=0){ g.weeklyData[existing].value=val; if(link) g.weeklyData[existing].link=link; else delete g.weeklyData[existing].link; }
        else { const entry={label:label,value:val}; if(link) entry.link=link; g.weeklyData.push(entry); }
        g.weeklyData=sortWeeklyData(g.weeklyData);
        recalcGoalFromWeekly(g);
        savedCount++;
    });

    // Cascade: goals → KPIs → quarters
    recalcKpiFromGoals(t);
    recalcFromPrimaryKpis(t);

    saveData();closeModal();renderContent();
    showToast(label+' 주간 데이터 '+savedCount+'건이 저장되었습니다','success');
}

// ===== QUARTER MODAL =====
function openQuarterModal(teamId,idx){
    const t=DATA.teams.find(x=>x.id===teamId);if(!t||!t.quarters)return;
    const q=t.quarters[idx];
    const theUnit=t.mainUnit||extractUnit(q.target)||'억';
    const tgtNum=extractNumber(q.target)||0;
    const curNum=extractNumber(q.current)||0;
    const pct=tgtNum>0?Math.round((curNum/tgtNum)*100):0;
    const hasPrimary=t.kpis&&t.kpis.some(k=>k.isPrimary);
    const qLabels=['Q1','Q2','Q3','Q4'];
    const qKey=qLabels[idx]||'';
    // 이 분기에 배정된 대표 KPI 목록
    const linkedPrimaryKpis=(t.kpis||[]).filter(k=>k.isPrimary&&(k.quarter===qKey||k.quarter==='all'));
    const linkedList=linkedPrimaryKpis.map(k=>'<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--gray-100)"><span style="font-size:13px;color:var(--gray-600)">'+k.title+'</span><span style="font-size:13px;font-weight:700;color:var(--gray-800)">'+k.current+'</span></div>').join('');
    const autoNote=hasPrimary?`
        <div style="padding:14px 16px;border-radius:10px;background:#EEFBF4;margin-bottom:16px">
            <div style="font-size:12px;font-weight:700;color:#3BA876;margin-bottom:8px">⭐ 대표 KPI에서 자동 합산</div>
            <div style="font-size:12px;color:var(--gray-500);margin-bottom:10px">현재 달성과 달성률은 대표 KPI 수치에서 자동으로 계산됩니다.</div>
            ${linkedList?'<div style="margin-top:8px">'+linkedList+'</div>':'<div style="font-size:12px;color:var(--gray-400)">이 분기에 배정된 대표 KPI가 없습니다.</div>'}
            <div style="display:flex;justify-content:space-between;padding:8px 0;margin-top:8px;border-top:1.5px solid #3BA87633;font-size:14px;font-weight:800;color:#3BA876"><span>합산 달성</span><span>${q.current||'0'}</span></div>
        </div>`:'';
    openModal(`
        <div class="modal-title">${q.label} 목표 수정</div>
        ${autoNote}
        <div class="form-row">
            <div class="form-group" style="flex:2"><label class="form-label">분기 목표 수치</label><input class="form-input" id="m_qqtn" type="number" step="any" value="${tgtNum||''}" placeholder="0" oninput="autoCalcPercent('m_qqcn','m_qqtn','m_qqp')"></div>
            <div class="form-group" style="flex:1"><label class="form-label">단위</label>${unitSelect('m_qqu',theUnit)}</div>
        </div>
        ${hasPrimary?`
            <div class="form-row">
                <div class="form-group" style="flex:2"><label class="form-label">현재 달성 <span style="font-size:11px;color:var(--gray-400)">(자동)</span></label><input class="form-input" id="m_qqcn" type="number" step="any" value="${curNum}" readonly style="background:var(--gray-50);color:var(--gray-400)"></div>
                <div class="form-group" style="flex:1"><label class="form-label">달성률</label><div style="padding:10px 14px;font-size:15px;font-weight:800;color:var(--primary)" id="m_qqp">${pct}%</div></div>
            </div>
        `:`
            <div class="form-row">
                <div class="form-group" style="flex:2"><label class="form-label">현재 달성</label><input class="form-input" id="m_qqcn" type="number" step="any" value="${curNum||''}" placeholder="0" oninput="autoCalcPercent('m_qqcn','m_qqtn','m_qqp')"></div>
                <div class="form-group" style="flex:1"><label class="form-label">달성률</label><div style="padding:10px 14px;font-size:15px;font-weight:800;color:var(--primary)" id="m_qqp">${pct}%</div></div>
            </div>
        `}
        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="saveQuarter('${teamId}',${idx})">저장</button>
        </div>
    `);
}

function saveQuarter(teamId,idx){
    const t=DATA.teams.find(x=>x.id===teamId);if(!t||!t.quarters)return;
    const tgtN=parseFloat(document.getElementById('m_qqtn').value)||0;
    const unit=document.getElementById('m_qqu').value;
    t.quarters[idx].target=autoFormatValue(tgtN,unit);
    // 대표 KPI가 있으면 현재 달성은 건드리지 않음 (자동 합산 유지)
    const hasPrimary=t.kpis&&t.kpis.some(k=>k.isPrimary);
    if(!hasPrimary){
        const curN=parseFloat(document.getElementById('m_qqcn').value)||0;
        t.quarters[idx].current=autoFormatValue(curN,unit);
    }
    // 달성률 재계산
    const tgtNum=extractNumber(t.quarters[idx].target);
    const curNum=extractNumber(t.quarters[idx].current);
    t.quarters[idx].percent=tgtNum>0?Math.round((curNum/tgtNum)*100):0;
    saveData();closeModal();renderContent();
}

// ===== CSV EXPORT =====
function exportToCSV(){
    const d=DATA;
    const rows=[];
    const sep=',';
    const esc=v=>{
        const s=String(v==null?'':v);
        return s.includes(sep)||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;
    };
    const addRow=(...cols)=>rows.push(cols.map(esc).join(sep));

    // 회사 전체 현황
    addRow('===== 전체 현황 =====');
    addRow('연간 목표','연간 달성','달성률');
    addRow(d.company.annualTarget+'억',d.company.annualCurrent+'억',
        d.company.annualTarget>0?Math.round(d.company.annualCurrent/d.company.annualTarget*100)+'%':'0%');
    addRow('');
    addRow('분기','목표','달성','달성률');
    d.company.quarters.forEach(q=>{
        const qp=q.target>0?Math.round(q.current/q.target*100):0;
        addRow(q.label,q.target+'억',q.current+'억',qp+'%');
    });
    addRow('');

    // 팀별 데이터
    d.teams.forEach(t=>{
        addRow('===== '+t.emoji+' '+t.name+' =====');
        addRow('메인 목표',t.mainGoal);
        addRow('현재',t.mainCurrent+t.mainUnit,'목표',t.mainTarget+t.mainUnit,
            '달성률',(t.mainTarget>0?Math.round(t.mainCurrent/t.mainTarget*100):0)+'%');
        addRow('');

        // 분기
        if(t.quarters){
            addRow('분기','목표','달성','달성률');
            t.quarters.forEach(q=>{
                addRow(q.label,q.target,q.current,q.percent+'%');
            });
            addRow('');
        }

        // KPI
        if(t.kpis&&t.kpis.length>0){
            addRow('KPI','목표','달성','달성률','분기','대표','매출반영');
            t.kpis.forEach(k=>{
                addRow(k.title,k.target,k.current,k.percent+'%',k.quarter||'all',k.isPrimary?'O':'',k.isRevenue?'O':'');
            });
            addRow('');
        }

        // 세부 목표
        if(t.goals&&t.goals.length>0){
            addRow('세부 목표','목표','달성','달성률','상태','마감일');
            t.goals.forEach(g=>{
                addRow(g.title,g.target,g.current,g.percent+'%',g.status,g.deadline);
            });
            addRow('');
        }

        // 주간 데이터 (KPI)
        const kpisWithWeekly=(t.kpis||[]).filter(k=>k.weeklyData&&k.weeklyData.length>0);
        if(kpisWithWeekly.length>0){
            addRow('--- 주간 데이터 (KPI) ---');
            kpisWithWeekly.forEach(k=>{
                addRow('KPI: '+k.title);
                addRow('주차','수치');
                k.weeklyData.forEach(w=>addRow(w.label,w.value));
            });
            addRow('');
        }

        // 주간 데이터 (세부 목표)
        const goalsWithWeekly=(t.goals||[]).filter(g=>g.weeklyData&&g.weeklyData.length>0);
        if(goalsWithWeekly.length>0){
            addRow('--- 주간 데이터 (세부 목표) ---');
            goalsWithWeekly.forEach(g=>{
                addRow('목표: '+g.title);
                addRow('주차','수치');
                g.weeklyData.forEach(w=>addRow(w.label,w.value));
            });
            addRow('');
        }
    });

    // BOM + UTF-8 for Excel
    const bom='\uFEFF';
    const csvContent=bom+rows.join('\n');
    const blob=new Blob([csvContent],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const today=new Date();
    const fname='Refeely_Dashboard_'+today.getFullYear()+(today.getMonth()+1).toString().padStart(2,'0')+today.getDate().toString().padStart(2,'0')+'.csv';
    a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('CSV 파일이 다운로드되었습니다','success');
}

// ===== PRINT MODE =====
function printDashboard(){
    // 인쇄 전: progress bar 즉시 채우기 (transition 없이)
    document.querySelectorAll('[data-target]').forEach(el=>{
        el.style.transition='none';
        el.style.width=el.dataset.target+'%';
    });
    // 인쇄 날짜 설정
    const now=new Date();
    const pd=document.getElementById('printDate');
    if(pd) pd.textContent='출력일: '+now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
    // 약간의 딜레이 후 인쇄
    setTimeout(()=>{
        window.print();
        // 인쇄 후 transition 복구
        setTimeout(()=>{
            document.querySelectorAll('[data-target]').forEach(el=>{
                el.style.transition='';
            });
        },500);
    },200);
}
